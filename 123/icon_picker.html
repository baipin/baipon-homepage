<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标选择器</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link rel="stylesheet" href="https://unpkg.com/@mdui/icons@2/material-icons.css">
    <style>
        :root { --mdui-color-primary: #0061A4; }
        body { margin: 0; padding: 20px; background: #f8f9fa; font-family: system-ui; transition: background 0.3s; }
        .mdui-theme-dark body { background: #1b1b1f; color: #e3e2e6; }

        /* 搜索框容器 */
        .search-container {
            position: sticky; top: 0; z-index: 100;
            background: #f8f9fa; padding-bottom: 20px;
        }
        .mdui-theme-dark .search-container { background: #1b1b1f; }

        .search-box {
            width: 100%; padding: 14px 20px;
            border: 2px solid #ddd; border-radius: 28px;
            font-size: 16px; outline: none; transition: all 0.2s;
            box-sizing: border-box;
        }
        .search-box:focus { border-color: var(--mdui-color-primary); box-shadow: 0 2px 8px rgba(0,97,164,0.2); }
        .mdui-theme-dark .search-box { background: #232429; border-color: #444; color: white; }

        /* 图标网格 */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }
        .icon-item {
            display: flex; flex-direction: column; align-items: center;
            padding: 16px 8px; border-radius: 16px; cursor: pointer;
            transition: all 0.2s cubic-bezier(0,0,0.2,1);
            border: 1px solid transparent;
        }
        .icon-item:hover {
            background: rgba(0, 97, 164, 0.08);
            transform: translateY(-4px);
            border-color: rgba(0, 97, 164, 0.2);
        }
        
        mdui-icon { font-size: 32px !important; margin-bottom: 8px; color: inherit; }
        .icon-name { font-size: 12px; opacity: 0.7; text-align: center; word-break: break-all; height: 32px; overflow: hidden; }
        
        /* 状态提示 */
        #status-msg { text-align: center; padding: 40px; opacity: 0.6; font-size: 14px; }
        .count-badge { font-size: 12px; margin-bottom: 8px; opacity: 0.5; text-align: right; }
    </style>
</head>
<body class="mdui-theme-auto">

    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="搜索 2500+ 个图标 (输入名称...)" autocomplete="off">
    </div>

    <div class="count-badge" id="count-display">正在解包 Google 图标库...</div>
    <div id="icon-grid" class="icon-grid"></div>
    <div id="status-msg"></div>

    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>

    <script>
        const grid = document.getElementById('icon-grid');
        const searchInput = document.getElementById('search');
        const statusMsg = document.getElementById('status-msg');
        const countDisplay = document.getElementById('count-display');

        let allIcons = []; // 存放解包后的全量图标名
        let filteredIcons = []; // 存放当前搜索过滤后的图标名
        let currentIndex = 0; // 当前分批加载的索引
        const BATCH_SIZE = 80; // 每批加载的数量

        // 1. 实时全量解包逻辑
        async function fetchAllIcons() {
            try {
                // 直接拉取 Google 官方元数据
                const response = await fetch('https://fonts.google.com/metadata/icons');
                const text = await response.text();
                // 移除 Google 的反 JSON 注入前缀
                const data = JSON.parse(text.replace(")]}'", ""));
                
                allIcons = data.icons.map(icon => icon.name);
                filteredIcons = allIcons;
                
                countDisplay.innerText = `已加载 ${allIcons.length} 个图标`;
                loadMore(); // 开始渲染第一批
            } catch (e) {
                console.error(e);
                statusMsg.innerHTML = "解包失败，请检查网络连接或浏览器拦截。";
                // 备用方案：尝试从本地 js 加载
                if(typeof materialIcons !== 'undefined') {
                    allIcons = materialIcons;
                    filteredIcons = allIcons;
                    loadMore();
                }
            }
        }

        // 2. 分批渲染逻辑 (解决性能问题)
        function renderBatch(icons, append = false) {
            if (!append) {
                grid.innerHTML = '';
                currentIndex = 0;
            }

            const batch = icons.slice(currentIndex, currentIndex + BATCH_SIZE);
            
            batch.forEach(name => {
                const item = document.createElement('div');
                item.className = 'icon-item';
                item.innerHTML = `
                    <mdui-icon name="${name}"></mdui-icon>
                    <div class="icon-name">${name}</div>
                `;
                item.onclick = () => {
                    window.parent.postMessage({ type: 'SELECT_ICON', icon: name }, '*');
                };
                grid.appendChild(item);
            });

            currentIndex += BATCH_SIZE;

            // 检查是否显示加载完毕
            if (currentIndex >= icons.length) {
                statusMsg.innerText = "已显示全部图标";
            } else {
                statusMsg.innerText = "向下滚动加载更多...";
            }
        }

        // 3. 滚动无限加载
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                if (currentIndex < filteredIcons.length) {
                    renderBatch(filteredIcons, true);
                }
            }
        };

        // 4. 搜索逻辑
        searchInput.oninput = () => {
            const term = searchInput.value.toLowerCase().trim();
            filteredIcons = allIcons.filter(name => name.includes(term));
            countDisplay.innerText = `匹配到 ${filteredIcons.length} 个图标`;
            renderBatch(filteredIcons, false);
        };

        // 5. 跟随主题
        try {
            if (window.parent.document.documentElement.classList.contains('mdui-theme-dark')) {
                document.documentElement.classList.add('mdui-theme-dark');
            }
        } catch(e) {}

        // 初始化
        fetchAllIcons();
    </script>
</body>
</html>
