<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择图标</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    
    <script src="js/icons.js" defer></script>

    <style>
        :root { font-family: system-ui, sans-serif; }
        body { margin: 0; padding: 20px; background: #f8f9fa; transition: background 0.3s; }
        .mdui-theme-dark body { background: #1e1e23; color: #fff; }
        
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 16px;
        }
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .icon-item:hover {
            background: rgba(0, 123, 255, 0.1);
            transform: translateY(-4px);
        }
        /* MDUI 图标组件样式 */
        mdui-icon { font-size: 32px; margin-bottom: 8px; }
        .icon-name { font-size: 0.75rem; opacity: 0.6; word-break: break-all; text-align: center; }
        
        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
        .mdui-theme-dark .search-box { background: #2a2a2f; border-color: #444; color: white; }
    </style>
</head>
<body class="mdui-theme-auto">
    <input type="text" id="search" class="search-box" placeholder="搜索图标名称 (例如: home, settings)...">
    <div id="icon-grid" class="icon-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 20px; opacity: 0.5;">
            正在加载图标库...
        </div>
    </div>

    <script>
        const grid = document.getElementById('icon-grid');
        const searchInput = document.getElementById('search');

        // 核心修复 1：安全检查 materialIcons 是否已从 icons.js 加载
        function init() {
            if (typeof materialIcons === 'undefined') {
                console.error('无法加载 icons.js，请检查路径 /123/js/icons.js 是否正确');
                grid.innerHTML = '<div style="color:red; grid-column:1/-1;">图标库加载失败，请检查文件路径或大小写。</div>';
                return;
            }
            renderIcons(materialIcons);
        }

        function renderIcons(filtered) {
            grid.innerHTML = '';
            // 优化渲染性能：如果图标极多，建议只渲染前 200 个或使用虚拟列表
            filtered.slice(0, 400).forEach(name => {
                const item = document.createElement('div');
                item.className = 'icon-item';
                item.innerHTML = `
                    <mdui-icon name="${name}"></mdui-icon>
                    <div class="icon-name">${name}</div>
                `;
                item.onclick = () => {
                    // 核心修复 2：postMessage 增加安全性，并确保跨域通信
                    window.parent.postMessage({
                        type: 'SELECT_ICON',
                        icon: name
                    }, '*'); 
                };
                grid.appendChild(item);
            });
        }

        // 搜索逻辑
        searchInput.addEventListener('input', () => {
            const term = searchInput.value.toLowerCase().trim();
            const filtered = materialIcons.filter(name => 
                name.toLowerCase().includes(term)
            );
            renderIcons(filtered);
        });

        // 核心修复 3：等待 window 加载完成，确保 icons.js 执行完毕
        window.onload = init;

        // 主题跟随逻辑优化：处理跨域受限的情况
        try {
            if (window.parent.document.documentElement.classList.contains('mdui-theme-dark')) {
                document.documentElement.classList.add('mdui-theme-dark');
            }
        } catch (e) {
            console.warn('无法获取父窗口主题样式（可能是跨域限制）');
        }
    </script>
</body>
</html>
