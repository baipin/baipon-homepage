<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择图标</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <script src="js/icons.js"></script>
    <style>
        body { margin:0; padding:20px; background:#f8f9fa; font-family:system-ui,sans-serif; }
        .mdui-theme-dark { background:#1e1e23; color:#fff; }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 16px;
        }
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .icon-item:hover {
            background: rgba(0,123,255,0.1);
            transform: translateY(-4px);
        }
        .icon-item mdui-icon { font-size: 42px; margin-bottom: 8px; }
        .icon-name { font-size: 0.85rem; opacity: 0.8; word-break: break-all; text-align:center; }
        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .mdui-theme-dark .search-box { background:#2a2a2f; border-color:#444; color:white; }
    </style>
</head>
<body class="mdui-theme-auto">
    <input type="text" id="search" class="search-box" placeholder="搜索图标名称...">
    <div id="icon-grid" class="icon-grid"></div>

    <script>
        const grid = document.getElementById('icon-grid');
        const searchInput = document.getElementById('search');

        function renderIcons(filtered) {
            grid.innerHTML = '';
            filtered.forEach(name => {
                const item = document.createElement('div');
                item.className = 'icon-item';
                item.innerHTML = `
                    <mdui-icon name="${name}"></mdui-icon>
                    <div class="icon-name">${name}</div>
                `;
                item.onclick = () => {
                    // 通过 postMessage 通知父页面
                    window.parent.postMessage({
                        type: 'SELECT_ICON',
                        icon: name
                    }, '*');
                };
                grid.appendChild(item);
            });
        }

        // 初始渲染
        renderIcons(materialIcons);

        // 搜索
        searchInput.addEventListener('input', () => {
            const term = searchInput.value.toLowerCase().trim();
            if (!term) {
                renderIcons(materialIcons);
                return;
            }
            const filtered = materialIcons.filter(name => 
                name.toLowerCase().includes(term)
            );
            renderIcons(filtered);
        });

        // 跟随父页面主题
        if (window.parent.document.documentElement.classList.contains('mdui-theme-dark')) {
            document.documentElement.classList.add('mdui-theme-dark');
        }
    </script>
</body>
</html>
