<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百品导航 - 新概念版</title>
    
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    <script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
    
    <style>
        :root { --nav-height: 64px; --hero-height: 42vh; }
        html { background-color: #fff; transition: background-color 0.3s; }
        html.mdui-theme-dark { background-color: #121212; }
        body { margin: 0; padding: 0; font-family: "Product Sans", system-ui, sans-serif; padding-top: var(--nav-height); }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('/home.jpg') center/cover no-repeat; z-index: -1;
        }
        .mdui-theme-dark body::before { filter: brightness(0.6); }

        /* --- 搜索区域 --- */
        .hero-space { height: var(--hero-height); display: flex; align-items: center; justify-content: center; }
        .search-wrapper {
            width: 100%; max-width: 600px; background: rgba(255,255,255,0.15);
            backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.25);
            border-radius: 50px; padding: 6px 16px; display: flex; align-items: center;
        }
        .search-input { flex-grow: 1; border: none; background: transparent; color: white; padding: 12px; font-size: 1.1rem; outline: none; }
        .mdui-theme-light .search-input { color: #000; }

        /* --- 布局 --- */
        .main-layout { max-width: 1200px; margin: 0 auto 60px; display: grid; grid-template-columns: 1fr 340px; gap: 28px; width: calc(100% - 40px); }
        .card-base { border-radius: 28px; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); padding: 32px; }
        .mdui-theme-dark .card-base { background: rgba(35, 34, 40, 0.85); color: #e6e1e5; }
        
        /* --- 书签网格 --- */
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 16px; }
        .bookmark-item {
            position: relative; display: flex; flex-direction: column; align-items: center;
            padding: 16px 8px; border-radius: 20px; background: rgba(128,128,128,0.06);
            text-decoration: none; color: inherit; transition: all 0.2s;
        }
        .bookmark-item:hover { transform: translateY(-5px); background: rgba(128,128,128,0.12); }
        .bookmark-item img, .bookmark-item mdui-icon { width: 32px; height: 32px; font-size: 32px; margin-bottom: 10px; border-radius: 6px; }
        .bookmark-item span { font-size: 0.85rem; font-weight: 600; text-align: center; }

        /* 管理模式样式 */
        .edit-mode .bookmark-item::after {
            content: "edit"; font-family: 'Material Icons'; position: absolute; top: 5px; right: 5px;
            font-size: 14px; background: #2196f3; color: white; border-radius: 50%; padding: 4px;
        }

        .side-module { padding: 24px; margin-bottom: 24px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } .side-card { order: -1; } }
    </style>
</head>
<body class="mdui-theme-auto">

    <header class="custom-app-bar" style="position:fixed; top:0; width:100%; z-index:1000; display:flex; align-items:center; padding: 0 5%; height:64px; background:rgba(255,255,255,0.7); backdrop-filter:blur(20px);">
        <span style="font-weight:900; font-size:1.2rem;">BAIPIN</span>
        <div style="flex-grow: 1"></div>
        <mdui-button-icon id="theme-toggle" icon="light_mode"></mdui-button-icon>
        <mdui-button-icon id="edit-mode-toggle" icon="edit_note"></mdui-button-icon>
    </header>

    <section class="hero-space">
        <div class="search-wrapper">
            <mdui-button-icon id="current-engine-btn" icon="search"></mdui-button-icon>
            <input type="text" class="search-input" id="search-input" placeholder="搜索一下...">
        </div>
    </section>

    <div class="main-layout">
        <main class="card-base">
            <div style="display:flex; align-items:center; margin-bottom:24px;">
                <div style="font-size: 1.3rem; font-weight: 900;">我的书签</div>
                <div style="flex-grow:1"></div>
                <mdui-button-icon id="add-bookmark-btn" icon="add" style="display:none"></mdui-button-icon>
            </div>
            
            <div class="link-grid" id="bookmark-container">
                </div>
        </main>

        <aside class="side-card">
            <div class="card-base side-module">
                <div style="font-size:0.75rem; opacity:0.5; margin-bottom:12px; font-weight:bold;">拾遗</div>
                <div id="jinrishici-sentence" style="font-style:italic; font-size:1.1rem;">...</div>
            </div>

            <div class="card-base side-module">
                <div style="font-size:0.75rem; font-weight:bold; opacity:0.6; margin-bottom:12px;">香港天文台</div>
                <div id="weather-info" style="font-size:0.9rem;">加载中...</div>
            </div>
        </aside>
    </div>

    <mdui-dialog id="bookmark-dialog" close-on-overlay-click>
        <span slot="headline" id="dialog-title">管理书签</span>
        <div style="display:flex; flex-direction:column; gap:16px;">
            <mdui-text-field label="名称" id="field-name"></mdui-text-field>
            <mdui-text-field label="链接 (URL)" id="field-url"></mdui-text-field>
            <mdui-text-field label="图标 (MDUI图标名或图片URL)" id="field-icon" placeholder="例如: rss_feed 或 https://..."></mdui-text-field>
        </div>
        <mdui-button slot="action" variant="text" id="btn-delete" style="color:red">删除</mdui-button>
        <mdui-button slot="action" variant="tonal" id="btn-save">保存</mdui-button>
    </mdui-dialog>

    <script>
        // 初始数据
        const defaultBookmarks = [
            { name: "我的RSS", url: "#", icon: "rss_feed" },
            { name: "香港01", url: "https://www.hk01.com", icon: "https://www.hk01.com/favicon.ico" },
            { name: "酷安", url: "https://www.coolapk.com", icon: "https://www.coolapk.com/favicon.ico" },
            { name: "知乎", url: "https://www.zhihu.com", icon: "https://www.zhihu.com/favicon.ico" },
            { name: "Now新闻", url: "#", icon: "newspaper" },
            { name: "unsplash", url: "https://unsplash.com", icon: "image" },
            { name: "豆瓣", url: "https://www.douban.com", icon: "https://www.douban.com/favicon.ico" },
            { name: "翻译", url: "https://translate.google.com", icon: "translate" },
            { name: "CSDN", url: "https://www.csdn.net", icon: "https://www.csdn.net/favicon.ico" },
            { name: "Github", url: "https://github.com", icon: "code" }
        ];

        let bookmarks = JSON.parse(localStorage.getItem('user_bookmarks')) || defaultBookmarks;
        let isEditMode = false;
        let currentEditIndex = null;

        const container = document.getElementById('bookmark-container');
        const dialog = document.getElementById('bookmark-dialog');

        // 渲染函数
        function render() {
            container.innerHTML = '';
            bookmarks.forEach((item, index) => {
                const a = document.createElement('a');
                a.className = 'bookmark-item';
                a.href = isEditMode ? 'javascript:void(0)' : item.url;
                if(!isEditMode) a.target = "_blank";
                
                // 判断是图标名还是URL
                const isImg = item.icon.includes('http') || item.icon.includes('.');
                const iconHtml = isImg ? `<img src="${item.icon}">` : `<mdui-icon name="${item.icon}"></mdui-icon>`;
                
                a.innerHTML = `${iconHtml}<span>${item.name}</span>`;
                a.onclick = () => { if(isEditMode) openEdit(index); };
                container.appendChild(a);
            });
            document.body.classList.toggle('edit-mode', isEditMode);
            document.getElementById('add-bookmark-btn').style.display = isEditMode ? 'inline-block' : 'none';
        }

        // 编辑模式切换
        document.getElementById('edit-mode-toggle').onclick = () => {
            isEditMode = !isEditMode;
            render();
        };

        // 打开对话框
        function openEdit(index = null) {
            currentEditIndex = index;
            if(index !== null) {
                document.getElementById('dialog-title').innerText = "修改书签";
                document.getElementById('field-name').value = bookmarks[index].name;
                document.getElementById('field-url').value = bookmarks[index].url;
                document.getElementById('field-icon').value = bookmarks[index].icon;
                document.getElementById('btn-delete').style.display = 'inline-block';
            } else {
                document.getElementById('dialog-title').innerText = "增加书签";
                document.getElementById('field-name').value = '';
                document.getElementById('field-url').value = '';
                document.getElementById('field-icon').value = '';
                document.getElementById('btn-delete').style.display = 'none';
            }
            dialog.open = true;
        }

        document.getElementById('add-bookmark-btn').onclick = () => openEdit();

        // 保存逻辑
        document.getElementById('btn-save').onclick = () => {
            const newItem = {
                name: document.getElementById('field-name').value,
                url: document.getElementById('field-url').value,
                icon: document.getElementById('field-icon').value || 'link'
            };
            if(currentEditIndex !== null) bookmarks[currentEditIndex] = newItem;
            else bookmarks.push(newItem);
            saveAndRefresh();
        };

        // 删除逻辑
        document.getElementById('btn-delete').onclick = () => {
            if(currentEditIndex !== null) {
                bookmarks.splice(currentEditIndex, 1);
                saveAndRefresh();
            }
        };

        function saveAndRefresh() {
            localStorage.setItem('user_bookmarks', JSON.stringify(bookmarks));
            dialog.open = false;
            render();
        }

        /* 基础功能：搜索与天气 */
        document.getElementById('search-input').onkeypress = (e) => {
            if(e.key === 'Enter') window.open('https://www.google.com/search?q=' + e.target.value, '_blank');
        };

        async function fetchWeather() {
            const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=sc');
            const data = await res.json();
            document.getElementById('weather-info').innerHTML = `<p>${data.forecastDesc}</p>`;
        }

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.onclick = () => {
            const isDark = document.documentElement.classList.toggle('mdui-theme-dark');
            themeToggle.icon = isDark ? 'dark_mode' : 'light_mode';
        };

        render();
        fetchWeather();
    </script>
</body>
</html>
