<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百品导航 - 123</title>
   
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    <script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
   
    <style>
        :root {
            --nav-height: 64px;
            --hero-height: 40vh;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #212121;
        }
        .mdui-theme-dark {
            --glass-bg: rgba(30, 30, 35, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
        }
        html, body { margin: 0; padding: 0; min-height: 100vh; background: transparent !important; color: var(--text-main); }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('/home.jpg') center/cover no-repeat; z-index: -2; }
        .app-bar {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height);
            z-index: 2000; display: flex; align-items: center; padding: 0 5%;
            background: var(--glass-bg) !important; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border); color: var(--text-main);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 1.2rem; }
        .logo-area img { height: 32px; }
        .hero-space { height: var(--hero-height); display: flex; align-items: center; justify-content: center; padding-top: var(--nav-height); }
        .search-container {
            width: 90%; max-width: 650px; background: var(--glass-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 50px; padding: 8px 20px;
            display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; z-index: 1500;
        }
        .search-input { flex: 1; border: none; background: transparent; padding: 12px; font-size: 1.1rem; outline: none; color: var(--text-main); }
        .engine-favicon { width: 24px; height: 24px; border-radius: 4px; cursor: pointer; display: block; }
        .content-layout { max-width: 1240px; margin: 0 auto 80px; display: grid; grid-template-columns: 1fr 360px; gap: 32px; padding: 0 20px; }
        .card-glass { border-radius: 28px; background: var(--glass-bg); backdrop-filter: blur(20px); padding: 32px; border: 1px solid var(--glass-border); color: var(--text-main); }
        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 18px; margin-top: 24px; }
        .link-item {
            position: relative; display: flex; flex-direction: column; align-items: center; padding: 20px 10px;
            border-radius: 22px; background: rgba(128,128,128,0.1); text-decoration: none; color: var(--text-main) !important; transition: all 0.2s;
        }
        .link-item:hover { transform: translateY(-5px); background: rgba(128,128,128,0.15); }
        .link-item img, .link-item mdui-icon { width: 32px; height: 32px; margin-bottom: 12px; border-radius: 6px; color: var(--text-main) !important; }
        .edit-active .link-item::after { content: "edit"; font-family: 'Material Icons'; position: absolute; top: 8px; right: 8px; font-size: 10px; background: #0081ff; color: white; border-radius: 50%; padding: 4px; }
        .weather-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding: 15px; background: rgba(128,128,128,0.05); border-radius: 20px; }
        #weather-icon-img { width: 56px; height: 56px; }
        .temp-display { font-size: 2.2rem; font-weight: 900; }
        .hum-display { font-size: 0.85rem; opacity: 0.8; }
        .weather-details p { margin: 8px 0; font-size: 0.95rem; line-height: 1.6; }
        @media (max-width: 900px) { .content-layout { grid-template-columns: 1fr; } .side-stack { order: -1; } }
    </style>
</head>
<body class="mdui-theme-auto">
    <header class="app-bar">
        <div class="logo-area">
            <img src="/logo.png" alt="Logo">
            <span>导航</span>
        </div>
        <div style="flex-grow: 1"></div>
        <mdui-button-icon id="theme-btn" icon="light_mode" style="color: inherit;"></mdui-button-icon>
        <mdui-button-icon id="edit-btn" icon="edit_note" style="color: inherit;"></mdui-button-icon>
    </header>
    <section class="hero-space">
        <div class="search-container">
            <mdui-dropdown id="engine-dropdown">
                <div slot="trigger"><img id="cur-engine-img" class="engine-favicon" src="https://www.google.com/favicon.ico"></div>
                <mdui-menu id="engine-menu">
                    <mdui-menu-item value="google"><img class="engine-favicon" src="https://www.google.com/favicon.ico" slot="icon">Google</mdui-menu-item>
                    <mdui-menu-item value="baidu"><img class="engine-favicon" src="https://www.baidu.com/favicon.ico" slot="icon">Baidu</mdui-menu-item>
                    <mdui-menu-item value="bing"><img class="engine-favicon" src="https://cn.bing.com/favicon.ico" slot="icon">Bing</mdui-menu-item>
                    <mdui-menu-item value="github"><img class="engine-favicon" src="https://github.com/favicon.ico" slot="icon">GitHub</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>
            <input type="text" class="search-input" id="search-input" placeholder="键入内容并搜索...">
        </div>
    </section>
    <div class="content-layout">
        <main class="card-glass" id="main-container">
            <div style="display:flex; align-items:center; justify-content:space-between;">
                <div style="font-size: 1.3rem; font-weight: 900;">快捷访问</div>
                <mdui-button-icon id="add-btn" icon="add" style="display:none; color: inherit;"></mdui-button-icon>
            </div>
            <div class="links-grid" id="links-wrapper"></div>
        </main>
        <aside class="side-stack" style="display:flex; flex-direction:column; gap:24px;">
            <div class="card-glass">
                <div style="font-size:0.7rem; opacity:0.6; font-weight:bold; margin-bottom:12px; letter-spacing:1px;">拾遗</div>
                <strong><span id="jinrishici-sentence">加载中...</span></strong>
            </div>
            <div class="card-glass">
                <div style="font-size:0.7rem; opacity:0.6; font-weight:bold; margin-bottom:12px; letter-spacing:1px;">本港天气</div>
                <div class="weather-header">
                    <img id="weather-icon-img" src="" style="display:none;">
                    <div>
                        <div class="temp-display"><span id="curr-temp">--</span>°C</div>
                        <div class="hum-display">相对湿度: <span id="curr-hum">--</span>%</div>
                    </div>
                </div>
                <div class="weather-details">
                    <div id="weather-info">正在从香港天文台获取天气预报…</div>
                    <div id="warning-info" style="color:#ff5252; font-weight:bold; margin-top:10px;"></div>
                    <div id="i-info" style="font-size:0.85rem; opacity:0.8; border-top:1px solid rgba(128,128,128,0.2); margin-top:10px; padding-top:10px;"></div>
                </div>
            </div>
        </aside>
    </div>
    <mdui-dialog id="edit-dialog" close-on-overlay-click>
        <span slot="headline">管理书签</span>
        <div style="display:flex; flex-direction:column; gap:15px; padding:10px 0;">
            <mdui-text-field label="URL" id="f-url"></mdui-text-field>
            <div style="display:flex; gap:10px; align-items:flex-end;">
                <mdui-text-field label="图标 (MDUI名或URL)" id="f-icon" style="flex:1"></mdui-text-field>
                <mdui-button variant="tonal" id="btn-get-icon">抓取图标</mdui-button>
            </div>
            <mdui-text-field label="显示名称" id="f-name"></mdui-text-field>
        </div>
        <mdui-button slot="action" variant="text" id="act-del" style="color:red">删除</mdui-button>
        <mdui-button slot="action" variant="tonal" id="act-save">保存</mdui-button>
    </mdui-dialog>
    <script>
        const initLinks = [
            { name: "我的RSS", url: "#", icon: "rss_feed" },
            { name: "香港01", url: "https://www.hk01.com", icon: "https://www.hk01.com/favicon.ico" },
            { name: "酷安", url: "https://www.coolapk.com", icon: "https://www.coolapk.com/favicon.ico" },
            { name: "知乎", url: "https://www.zhihu.com", icon: "https://www.zhihu.com/favicon.ico" },
            { name: "Now新闻", url: "https://news.now.com", icon: "newspaper" },
            { name: "unsplash", url: "https://unsplash.com", icon: "image" },
            { name: "豆瓣", url: "https://www.douban.com", icon: "https://www.douban.com/favicon.ico" },
            { name: "翻译", url: "https://translate.google.com", icon: "translate" },
            { name: "斗鱼", url: "https://www.douyu.com", icon: "https://www.douyu.com/favicon.ico" },
            { name: "CSDN", url: "https://www.csdn.net", icon: "https://www.csdn.net/favicon.ico" },
            { name: "XDA", url: "https://www.xda-developers.com", icon: "developer_mode" },
            { name: "百品博客", url: "https://baipin.pw", icon: "article" },
            { name: "AIMS", url: "https://banweb.cityu.edu.hk/", icon: "school" },
            { name: "学校邮箱", url: "https://mail.office365.com/my.cityu.edu.hk", icon: "mail" },
            { name: "Canvas", url: "https://canvas.cityu.edu.hk/", icon: "dashboard" },
            { name: "应用面板", url: "https://auth.cityu.edu.hk/", icon: "apps" },
            { name: "Github", url: "https://github.com", icon: "code" }
        ];
        let bookmarks = JSON.parse(localStorage.getItem('bp_v7')) || initLinks;
        let isEdit = false, curIdx = null;
        function render() {
            const wrapper = document.getElementById('links-wrapper');
            wrapper.innerHTML = '';
            bookmarks.forEach((item, i) => {
                const el = document.createElement('a');
                el.className = 'link-item';
                el.href = isEdit ? 'javascript:void(0)' : item.url;
                if(!isEdit) el.target = "_blank";
                const isImg = item.icon.includes('http') || item.icon.includes('.');
                const iconHtml = isImg ? `<img src="${item.icon}">` : `<mdui-icon name="${item.icon}"></mdui-icon>`;
                el.innerHTML = `${iconHtml}<span>${item.name}</span>`;
                el.onclick = () => { if(isEdit) openDialog(i); };
                wrapper.appendChild(el);
            });
            document.getElementById('main-container').classList.toggle('edit-active', isEdit);
            document.getElementById('add-btn').style.display = isEdit ? 'inline-block' : 'none';
        }
        /* --- 搜索切换核心修复 --- */
        let curEng = 'google';
        const engines = {
            google: 'https://www.google.com/search?q=',
            baidu: 'https://www.baidu.com/s?wd=',
            bing: 'https://cn.bing.com/search?q=',
            github: 'https://github.com/search?q='
        };
        const engineMenu = document.getElementById('engine-menu');
        const engineImg = document.getElementById('cur-engine-img');
        engineMenu.onclick = (e) => {
            const item = e.target.closest('mdui-menu-item');
            if (item) {
                curEng = item.value;
                const iconSrc = item.querySelector('img').src;
                engineImg.src = iconSrc;
                document.getElementById('engine-dropdown').open = false;
            }
        };
        document.getElementById('search-input').onkeypress = (e) => {
            if(e.key === 'Enter' && e.target.value.trim()) {
                window.open(engines[curEng] + encodeURIComponent(e.target.value), '_blank');
            }
        };
        /* --- 书签管理 --- */
        const dialog = document.getElementById('edit-dialog');
        document.getElementById('edit-btn').onclick = () => { isEdit = !isEdit; render(); };
        document.getElementById('add-btn').onclick = () => openDialog();
        document.getElementById('btn-get-icon').onclick = () => {
            const url = document.getElementById('f-url').value;
            if (url && url.startsWith('http')) {
                const domain = new URL(url).origin;
                document.getElementById('f-icon').value = `${domain}/favicon.ico`;
            }
        };
        function openDialog(idx = null) {
            curIdx = idx;
            document.getElementById('f-name').value = idx !== null ? bookmarks[idx].name : '';
            document.getElementById('f-url').value = idx !== null ? bookmarks[idx].url : '';
            document.getElementById('f-icon').value = idx !== null ? bookmarks[idx].icon : '';
            document.getElementById('act-del').style.display = idx !== null ? 'block' : 'none';
            dialog.open = true;
        }
        document.getElementById('act-save').onclick = () => {
            const data = { name: document.getElementById('f-name').value || '未命名', url: document.getElementById('f-url').value || '#', icon: document.getElementById('f-icon').value || 'link' };
            if(curIdx !== null) bookmarks[curIdx] = data; else bookmarks.push(data);
            localStorage.setItem('bp_v7', JSON.stringify(bookmarks));
            dialog.open = false; render();
        };
        document.getElementById('act-del').onclick = () => { if(curIdx !== null) { bookmarks.splice(curIdx, 1); localStorage.setItem('bp_v7', JSON.stringify(bookmarks)); dialog.open = false; render(); } };
        /* --- 天气代码逻辑 --- */
        const apiUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=sc';
        const warningApiUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warningInfo&lang=tc';
        const iUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=sc';
        // const rthUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rth&lang=sc'; // 原接口已弃用

        async function fetchData(url, elementId, formatData) {
            const element = document.getElementById(elementId);
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('网络响应不正常');
                const data = await response.json();
                element.innerHTML = formatData(data);
            } catch (error) { element.innerHTML = `无法加载数据：${error.message}`; }
        }
        function formatWeatherData(data) {
            return `<p><strong>总体情况：</strong>${data.generalSituation}</p>
                    <p><strong>天气预测：</strong>${data.forecastDesc}</p>
                    <p><strong>展望：</strong>${data.outlook}</p>
                    <p style="font-size:0.8rem; opacity:0.6;">更新时间：${data.updateTime}</p>`;
        }
        function formatWarningData(data) {
            if (!data.details || data.details.length === 0) return '现时没有警告生效。';
            return data.details.map(detail => `<p>⚠️ ${detail.contents.join(' ')}</p>`).join('');
        }
        function formatSpecialWeatherData(data) {
            if (!data.swt || data.swt.length === 0) return '现时没有特别天气提示。';
            return data.swt.map(item => `<p>ℹ️ ${item.desc}</p>`).join('');
        }

        /* 修改后的实时温度和湿度获取函数（使用官方 rhrread 接口） */
        async function updateLiveWeather() {
            const liveUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc'; // 当前天气报告（推荐）
            try {
                const res = await fetch(liveUrl);
                if (!res.ok) throw new Error('无法获取实时天气');
                const data = await res.json();

                // 温度（香港天文台总部数据）
                if (data.temperature && data.temperature.data && data.temperature.data.length > 0) {
                    const tempValue = data.temperature.data[0].value;
                    document.getElementById('curr-temp').innerText = tempValue;
                }

                // 相对湿度
                if (data.humidity && data.humidity.data && data.humidity.data.length > 0) {
                    const humValue = data.humidity.data[0].value;
                    document.getElementById('curr-hum').innerText = humValue;
                }


            } catch(e) {
                console.error('实时天气获取失败:', e);
                // 失败时可保留默认 -- 
            }
        }

        /* --- 主题控制 --- */
        document.getElementById('theme-btn').onclick = () => {
            const isDark = document.documentElement.classList.toggle('mdui-theme-dark');
            document.documentElement.classList.toggle('mdui-theme-light', !isDark);
            document.getElementById('theme-btn').icon = isDark ? 'dark_mode' : 'light_mode';
        };

        render();
        updateLiveWeather();                    // 实时温度湿度
        fetchData(apiUrl, 'weather-info', formatWeatherData);
        fetchData(warningApiUrl, 'warning-info', formatWarningData);
        fetchData(iUrl, 'i-info', formatSpecialWeatherData);
    </script>
</body>
</html>
