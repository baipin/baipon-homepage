<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百品导航 - 123</title>
    
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    <script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
    
    <style>
        :root { 
            --nav-height: 64px; 
            --hero-height: 40vh; 
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-primary: #1c1b1f;
        }

        .mdui-theme-dark {
            --glass-bg: rgba(30, 30, 35, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e6e1e5;
        }

        html, body { margin: 0; padding: 0; min-height: 100vh; background-color: transparent !important; color: var(--text-primary); }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('/home.jpg') center/cover no-repeat; z-index: -2; }

        /* --- 导航栏 --- */
        .app-bar {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height);
            z-index: 2000; display: flex; align-items: center; padding: 0 5%;
            background: var(--glass-bg) !important; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 1.25rem; text-decoration: none; color: inherit; }
        .logo-area img { height: 32px; }

        /* --- 搜索区 (修复 Dropdown 被遮挡) --- */
        .hero-space { height: var(--hero-height); display: flex; align-items: center; justify-content: center; padding-top: var(--nav-height); }
        .search-container {
            width: 90%; max-width: 650px; 
            background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 50px; padding: 6px 16px; 
            display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            /* 注意：此处不再设置 position: relative 以防止层级塌陷 */
        }
        .search-input { flex: 1; border: none; background: transparent; padding: 12px; font-size: 1.15rem; outline: none; color: inherit; }
        .engine-icon-btn { cursor: pointer; padding: 8px; transition: opacity 0.2s; display: flex; align-items: center; }
        .engine-favicon { width: 26px; height: 26px; border-radius: 4px; }

        /* --- 布局 --- */
        .content-layout { max-width: 1240px; margin: 0 auto 80px; display: grid; grid-template-columns: 1fr 380px; gap: 32px; padding: 0 20px; }
        .card-glass { border-radius: 28px; background: var(--glass-bg); backdrop-filter: blur(20px); padding: 32px; border: 1px solid var(--glass-border); }
        
        /* --- 书签网格 --- */
        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 20px; margin-top: 24px; }
        .link-item {
            position: relative; display: flex; flex-direction: column; align-items: center; padding: 22px 10px; 
            border-radius: 24px; background: rgba(128,128,128,0.1); text-decoration: none; color: inherit; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .link-item:hover { transform: translateY(-6px); background: rgba(128,128,128,0.18); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .link-item img, .link-item mdui-icon { width: 34px; height: 34px; font-size: 34px; margin-bottom: 12px; border-radius: 8px; }
        .edit-active .link-item::after { content: "edit"; font-family: 'Material Icons'; position: absolute; top: 8px; right: 8px; font-size: 10px; background: #2196f3; color: white; border-radius: 50%; padding: 4px; }

        /* --- 可视化天气组件 --- */
        .weather-visual { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; padding: 15px; background: rgba(128,128,128,0.05); border-radius: 20px; }
        .weather-icon-img { width: 64px; height: 64px; }
        .weather-stats { display: flex; flex-direction: column; gap: 4px; }
        .temp-val { font-size: 2rem; font-weight: 900; line-height: 1; }
        .hum-val { font-size: 0.9rem; opacity: 0.7; }
        .weather-info-text p { margin: 10px 0; font-size: 0.95rem; line-height: 1.6; }

        @media (max-width: 900px) { .content-layout { grid-template-columns: 1fr; } .side-stack { order: -1; } }
    </style>
</head>
<body class="mdui-theme-auto">

    <header class="app-bar">
        <a href="/" class="logo-area">
            <img src="/logo.png" alt="Logo">
            <span>导航</span>
        </a>
        <div style="flex-grow: 1"></div>
        <mdui-button-icon id="theme-btn" icon="light_mode"></mdui-button-icon>
        <mdui-button-icon id="edit-btn" icon="edit_note"></mdui-button-icon>
    </header>

    <section class="hero-space">
        <div class="search-container">
            <mdui-dropdown placement="bottom-start">
                <div slot="trigger" class="engine-icon-btn">
                    <img id="cur-engine-img" class="engine-favicon" src="https://www.google.com/favicon.ico">
                </div>
                <mdui-menu id="engine-menu">
                    <mdui-menu-item value="google"><img class="engine-favicon" src="https://www.google.com/favicon.ico" slot="icon">Google</mdui-menu-item>
                    <mdui-menu-item value="baidu"><img class="engine-favicon" src="https://www.baidu.com/favicon.ico" slot="icon">Baidu</mdui-menu-item>
                    <mdui-menu-item value="bing"><img class="engine-favicon" src="https://cn.bing.com/favicon.ico" slot="icon">Bing</mdui-menu-item>
                    <mdui-menu-item value="github"><img class="engine-favicon" src="https://github.com/favicon.ico" slot="icon">GitHub</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>
            <input type="text" class="search-input" id="search-input" placeholder="键入以搜索...">
        </div>
    </section>

    <div class="content-layout">
        <main class="card-glass" id="main-container">
            <div style="display:flex; align-items:center; justify-content:space-between;">
                <div style="font-size: 1.3rem; font-weight: 900; letter-spacing: 1px;">快捷访问</div>
                <mdui-button-icon id="add-btn" icon="add" style="display:none"></mdui-button-icon>
            </div>
            <div class="links-grid" id="links-wrapper"></div>
        </main>

        <aside class="side-stack" style="display:flex; flex-direction:column; gap:24px;">
            <div class="card-glass" style="padding:28px;">
                <div style="font-size:0.75rem; opacity:0.6; font-weight:bold; margin-bottom:12px; letter-spacing:1px;">拾遗</div>
                <strong><span id="jinrishici-sentence">正在加载诗词....</span></strong> 
            </div>

            <div class="card-glass" style="padding:28px;">
                <div style="font-size:0.75rem; opacity:0.6; font-weight:bold; margin-bottom:15px; letter-spacing:1px;">本港天气预报</div>
                
                <div id="weather-now" class="weather-visual">
                    <div id="weather-icon-container"></div>
                    <div class="weather-stats">
                        <div class="temp-val"><span id="curr-temp">--</span>°C</div>
                        <div class="hum-val">相对湿度: <span id="curr-hum">--</span>%</div>
                    </div>
                </div>

                <div id="weather-info" class="weather-info-text">正在从香港天文台获取...</div>
                <div id="warning-info" style="color:#ff5252; font-weight:bold; font-size:0.9rem; margin-top:12px;"></div>
                <div id="i-info" style="font-size:0.85rem; opacity:0.8; border-top: 1px solid rgba(128,128,128,0.2); margin-top:12px; padding-top:12px;"></div>
            </div>
        </aside>
    </div>

    <mdui-dialog id="edit-dialog" close-on-overlay-click>
        <span slot="headline">管理书签</span>
        <div style="display:flex; flex-direction:column; gap:15px; padding:10px 0;">
            <mdui-text-field label="链接 (URL)" id="f-url" placeholder="https://"></mdui-text-field>
            <div style="display:flex; gap:10px; align-items:flex-end;">
                <mdui-text-field label="图标 (URL/MDUI名)" id="f-icon" style="flex:1"></mdui-text-field>
                <mdui-button variant="tonal" id="btn-get-icon">抓取</mdui-button>
            </div>
            <mdui-text-field label="名称" id="f-name"></mdui-text-field>
        </div>
        <mdui-button slot="action" variant="text" id="act-del" style="color:red">删除</mdui-button>
        <mdui-button slot="action" variant="tonal" id="act-save">保存</mdui-button>
    </mdui-dialog>

    <script>
        /* --- 1. 数据逻辑 --- */
        const initLinks = [
            { name: "我的RSS", url: "#", icon: "rss_feed" },
            { name: "香港01", url: "https://www.hk01.com", icon: "https://www.hk01.com/favicon.ico" },
            { name: "酷安", url: "https://www.coolapk.com", icon: "https://www.coolapk.com/favicon.ico" },
            { name: "知乎", url: "https://www.zhihu.com", icon: "https://www.zhihu.com/favicon.ico" },
            { name: "Now新闻", url: "https://news.now.com", icon: "newspaper" },
            { name: "unsplash", url: "https://unsplash.com", icon: "image" },
            { name: "豆瓣", url: "https://www.douban.com", icon: "https://www.douban.com/favicon.ico" },
            { name: "翻译", url: "https://translate.google.com", icon: "translate" },
            { name: "斗鱼", url: "https://www.douyu.com", icon: "https://www.douyu.com/favicon.ico" },
            { name: "CSDN", url: "https://www.csdn.net", icon: "https://www.csdn.net/favicon.ico" },
            { name: "XDA", url: "https://www.xda-developers.com", icon: "developer_mode" },
            { name: "百品博客", url: "https://baipin.pw", icon: "article" },
            { name: "AIMS", url: "https://banweb.cityu.edu.hk/", icon: "school" },
            { name: "学校邮箱", url: "https://mail.office365.com/my.cityu.edu.hk", icon: "mail" },
            { name: "Canvas", url: "https://canvas.cityu.edu.hk/", icon: "dashboard" },
            { name: "应用面板", url: "https://auth.cityu.edu.hk/", icon: "apps" },
            { name: "Github", url: "https://github.com", icon: "code" }
        ];

        let bookmarks = JSON.parse(localStorage.getItem('bp_v5')) || initLinks;
        let isEdit = false, curIdx = null;
        const wrapper = document.getElementById('links-wrapper');
        const dialog = document.getElementById('edit-dialog');

        function render() {
            wrapper.innerHTML = '';
            bookmarks.forEach((item, i) => {
                const el = document.createElement('a');
                el.className = 'link-item';
                el.href = isEdit ? 'javascript:void(0)' : item.url;
                if(!isEdit) el.target = "_blank";
                const isImg = item.icon.includes('http') || item.icon.includes('.');
                el.innerHTML = (isImg ? `<img src="${item.icon}">` : `<mdui-icon name="${item.icon}"></mdui-icon>`) + `<span>${item.name}</span>`;
                el.onclick = () => { if(isEdit) openDialog(i); };
                wrapper.appendChild(el);
            });
            document.getElementById('main-container').classList.toggle('edit-active', isEdit);
            document.getElementById('add-btn').style.display = isEdit ? 'inline-block' : 'none';
        }

        /* --- 2. 管理功能 --- */
        document.getElementById('edit-btn').onclick = () => { isEdit = !isEdit; render(); };
        document.getElementById('add-btn').onclick = () => openDialog();
        document.getElementById('btn-get-icon').onclick = () => {
            const url = document.getElementById('f-url').value;
            if (url && url.startsWith('http')) {
                const domain = new URL(url).origin;
                document.getElementById('f-icon').value = `${domain}/favicon.ico`;
            }
        };

        function openDialog(idx = null) {
            curIdx = idx;
            document.getElementById('f-name').value = idx !== null ? bookmarks[idx].name : '';
            document.getElementById('f-url').value = idx !== null ? bookmarks[idx].url : '';
            document.getElementById('f-icon').value = idx !== null ? bookmarks[idx].icon : '';
            document.getElementById('act-del').style.display = idx !== null ? 'block' : 'none';
            dialog.open = true;
        }

        document.getElementById('act-save').onclick = () => {
            const data = { name: document.getElementById('f-name').value || '未命名', url: document.getElementById('f-url').value || '#', icon: document.getElementById('f-icon').value || 'link' };
            if(curIdx !== null) bookmarks[curIdx] = data; else bookmarks.push(data);
            localStorage.setItem('bp_v5', JSON.stringify(bookmarks));
            dialog.open = false; render();
        };

        document.getElementById('act-del').onclick = () => { if(curIdx !== null) { bookmarks.splice(curIdx, 1); localStorage.setItem('bp_v5', JSON.stringify(bookmarks)); dialog.open = false; render(); } };

        /* --- 3. 搜索切换逻辑 --- */
        let activeEng = 'google';
        const engines = { google: 'https://www.google.com/search?q=', baidu: 'https://www.baidu.com/s?wd=', bing: 'https://cn.bing.com/search?q=', github: 'https://github.com/search?q=' };
        document.getElementById('engine-menu').onclick = (e) => {
            const item = e.target.closest('mdui-menu-item');
            if (!item) return;
            activeEng = item.value;
            document.getElementById('cur-engine-img').src = item.querySelector('img').src;
        };
        document.getElementById('search-input').onkeypress = (e) => { if(e.key === 'Enter') window.open(engines[activeEng] + encodeURIComponent(e.target.value), '_blank'); };

        /* --- 4. 香港天文台全功能代码 --- */
        const weatherRoot = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php';
        
        async function updateWeather() {
            try {
                // 获取当前温度/湿度/图标
                const rRes = await fetch(`${weatherRoot}?dataType=rth&lang=sc`);
                const rData = await rRes.json();
                if(rData.temperature && rData.temperature.data.length > 0) {
                    document.getElementById('curr-temp').innerText = rData.temperature.data[0].value;
                }
                if(rData.humidity && rData.humidity.data.length > 0) {
                    document.getElementById('curr-hum').innerText = rData.humidity.data[0].value;
                }
                if(rData.icon && rData.icon.length > 0) {
                    document.getElementById('weather-icon-container').innerHTML = `<img class="weather-icon-img" src="https://www.hko.gov.hk/images/HKO_logo.png" data-src="https://www.hko.gov.hk/images/wxicon/pic${rData.icon[0]}.png" onload="this.src=this.dataset.src">`;
                }

                // 获取天气预报
                const fRes = await fetch(`${weatherRoot}?dataType=flw&lang=sc`);
                const fData = await fRes.json();
                document.getElementById('weather-info').innerHTML = `
                    <p><strong>总体情况：</strong>${fData.generalSituation}</p>
                    <p><strong>天气预测：</strong>${fData.forecastDesc}</p>
                    <p><strong>展望：</strong>${fData.outlook}</p>
                    <p style="font-size:0.7rem; opacity:0.5;">更新时间: ${fData.updateTime}</p>
                `;

                // 警告信息
                const wRes = await fetch(`${weatherRoot}?dataType=warningInfo&lang=tc`);
                const wData = await wRes.json();
                const wEl = document.getElementById('warning-info');
                if (wData.details && wData.details.length > 0) {
                    wEl.innerHTML = wData.details.map(d => `<p>⚠️ ${d.contents.join(' ')}</p>`).join('');
                } else { wEl.innerHTML = '现时没有警告生效。'; }

                // 特别天气提示
                const sRes = await fetch(`${weatherRoot}?dataType=swt&lang=sc`);
                const sData = await sRes.json();
                const iEl = document.getElementById('i-info');
                if (sData.swt && sData.swt.length > 0) {
                    iEl.innerHTML = sData.swt.map(s => `<p>ℹ️ ${s.desc}</p>`).join('');
                } else { iEl.innerHTML = '现时没有特别天气提示。'; }

            } catch (err) { console.error("天文台 API 加载失败", err); }
        }

        /* --- 5. 初始化 --- */
        document.getElementById('theme-btn').onclick = () => {
            const isDark = document.documentElement.classList.toggle('mdui-theme-dark');
            document.documentElement.classList.toggle('mdui-theme-light', !isDark);
            document.getElementById('theme-btn').icon = isDark ? 'dark_mode' : 'light_mode';
        };

        render();
        updateWeather();
    </script>
</body>
</html>
