<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百品导航 - 123</title>
    
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    <script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
    
    <style>
        :root { 
            --nav-height: 64px; 
            --hero-height: 45vh; 
            --max-width: 1240px;
        }

        /* --- 1. 全局背景与色彩修复 --- */
        html, body { margin: 0; padding: 0; min-height: 100vh; background-color: transparent !important; }
        
        /* 强制背景图片显示 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('/home.jpg') center/cover no-repeat; z-index: -2;
            transition: filter 0.5s;
        }

        /* 黑暗模式遮罩，防止全黑 */
        .mdui-theme-dark body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: -1;
        }

        /* --- 2. 导航栏修复 --- */
        .app-bar {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height);
            z-index: 1000; display: flex; align-items: center; padding: 0 5%;
            background: rgba(255,255,255,0.75) !important; backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(128,128,128,0.1);
            color: #000 !important;
        }
        .mdui-theme-dark .app-bar { 
            background: rgba(30,30,35,0.75) !important; 
            color: #fff !important; 
        }

        /* --- 3. Hero 搜索区 --- */
        .hero-space { height: var(--hero-height); display: flex; align-items: center; justify-content: center; padding-top: var(--nav-height); }
        .search-container {
            width: 90%; max-width: 650px; background: rgba(255,255,255,0.25);
            backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px; padding: 8px 18px; display: flex; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .search-input { 
            flex: 1; border: none; background: transparent; padding: 12px; 
            font-size: 1.15rem; outline: none; color: inherit;
        }
        .mdui-theme-light .search-input { color: #000; }
        .mdui-theme-dark .search-input { color: #fff; }

        /* --- 4. 核心布局 --- */
        .content-layout {
            max-width: var(--max-width); margin: 0 auto 80px;
            display: grid; grid-template-columns: 1fr 360px; gap: 32px; padding: 0 20px;
        }

        /* 卡片基础：确保黑暗模式不黑死 */
        .card-glass {
            border-radius: 28px; backdrop-filter: blur(20px); padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 1px solid rgba(128,128,128,0.1);
        }
        .mdui-theme-light .card-glass { background: rgba(255,255,255,0.85); color: #000; }
        .mdui-theme-dark .card-glass { background: rgba(40,40,45,0.8); color: #e6e1e5; }

        /* 书签网格 */
        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 20px; margin-top: 24px; }
        .link-item {
            position: relative; display: flex; flex-direction: column; align-items: center;
            padding: 20px 12px; border-radius: 22px; background: rgba(128,128,128,0.08);
            text-decoration: none; color: inherit; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .link-item:hover { transform: translateY(-5px); background: rgba(128,128,128,0.15); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .link-item img, .link-item mdui-icon { width: 32px; height: 32px; font-size: 32px; margin-bottom: 12px; }
        .link-item span { font-size: 0.85rem; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        /* 编辑状态指示 */
        .edit-active .link-item::after {
            content: "edit"; font-family: 'Material Icons'; position: absolute; top: 8px; right: 8px;
            font-size: 10px; background: #0081ff; color: white; border-radius: 50%; padding: 4px;
        }

        /* 天气样式 */
        .weather-box { font-size: 0.9rem; line-height: 1.7; }
        .weather-box p { margin: 8px 0; }
        .weather-box strong { color: #0081ff; }

        @media (max-width: 900px) {
            .content-layout { grid-template-columns: 1fr; }
            .side-stack { order: -1; }
            :root { --hero-height: 35vh; }
        }
    </style>
</head>
<body class="mdui-theme-auto">

    <header class="app-bar">
        <span style="font-weight:900; letter-spacing:1px; font-size:1.2rem;">BAIPIN.PW</span>
        <div style="flex-grow: 1"></div>
        <mdui-button-icon id="theme-btn" icon="light_mode"></mdui-button-icon>
        <mdui-button-icon id="edit-btn" icon="edit"></mdui-button-icon>
    </header>

    <section class="hero-space">
        <div class="search-container">
            <mdui-dropdown>
                <mdui-button-icon slot="trigger" icon="search" id="engine-icon"></mdui-button-icon>
                <mdui-menu id="engine-menu">
                    <mdui-menu-item value="google">Google</mdui-menu-item>
                    <mdui-menu-item value="baidu">Baidu</mdui-menu-item>
                    <mdui-menu-item value="bing">Bing</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>
            <input type="text" class="search-input" id="search-input" placeholder="输入内容，探索世界...">
        </div>
    </section>

    <div class="content-layout">
        <main class="card-glass" id="main-container">
            <div style="display:flex; align-items:center; justify-content:space-between;">
                <div style="font-size:1.3rem; font-weight:900;">快捷导航</div>
                <mdui-button-icon id="add-btn" icon="add" style="display:none"></mdui-button-icon>
            </div>
            <div class="links-grid" id="links-wrapper"></div>
        </main>

        <aside class="side-stack" style="display:flex; flex-direction:column; gap:24px;">
            <div class="card-glass" style="padding:24px;">
                <div style="font-size:0.75rem; opacity:0.6; font-weight:bold; margin-bottom:12px; letter-spacing:1px;">拾遗</div>
                <div id="jinrishici-sentence" style="font-family: 'Noto Serif SC', serif; font-style: italic; font-size: 1.1rem; line-height: 1.6;">...</div>
            </div>

            <div class="card-glass" style="padding:24px;">
                <div style="font-size:0.75rem; opacity:0.6; font-weight:bold; margin-bottom:12px;">本港天气</div>
                <div id="weather-info" class="weather-box">正在连接天文台...</div>
                <div id="warning-info" style="color:#ff5252; font-weight:bold; font-size:0.85rem; margin-top:10px;"></div>
                <div id="i-info" style="font-size:0.8rem; opacity:0.8; margin-top:10px;"></div>
            </div>
        </aside>
    </div>

    <mdui-dialog id="edit-dialog" close-on-overlay-click>
        <span slot="headline">管理书签</span>
        <div style="display:flex; flex-direction:column; gap:20px; padding:10px 0;">
            <mdui-text-field label="名称" id="f-name"></mdui-text-field>
            <mdui-text-field label="地址 (URL)" id="f-url"></mdui-text-field>
            <mdui-text-field label="图标 (MDUI图标名 或 图片URL)" id="f-icon"></mdui-text-field>
        </div>
        <mdui-button slot="action" variant="text" id="act-del" style="color:red">删除</mdui-button>
        <mdui-button slot="action" variant="tonal" id="act-save">保存</mdui-button>
    </mdui-dialog>

    <script>
        // 1. 完整链接初始化
        const initLinks = [
            { name: "我的RSS", url: "#", icon: "rss_feed" },
            { name: "香港01", url: "https://www.hk01.com", icon: "https://www.hk01.com/favicon.ico" },
            { name: "酷安", url: "https://www.coolapk.com", icon: "https://www.coolapk.com/favicon.ico" },
            { name: "知乎", url: "https://www.zhihu.com", icon: "https://www.zhihu.com/favicon.ico" },
            { name: "Now新闻", url: "#", icon: "newspaper" },
            { name: "unsplash", url: "https://unsplash.com", icon: "image" },
            { name: "豆瓣", url: "https://www.douban.com", icon: "https://www.douban.com/favicon.ico" },
            { name: "翻译", url: "https://translate.google.com", icon: "translate" },
            { name: "斗鱼", url: "https://www.douyu.com", icon: "https://www.douyu.com/favicon.ico" },
            { name: "CSDN", url: "https://www.csdn.net", icon: "https://www.csdn.net/favicon.ico" },
            { name: "XDA", url: "https://www.xda-developers.com", icon: "developer_mode" },
            { name: "百品博客", url: "https://baipin.pw", icon: "article" },
            { name: "AIMS", url: "#", icon: "school" },
            { name: "学校邮箱", url: "#", icon: "mail" },
            { name: "Canvas", url: "#", icon: "dashboard" },
            { name: "应用面板", url: "#", icon: "apps" },
            { name: "Github", url: "https://github.com", icon: "code" }
        ];

        let bookmarks = JSON.parse(localStorage.getItem('bp_nav_v2')) || initLinks;
        let isEdit = false;
        let curIdx = null;

        const wrapper = document.getElementById('links-wrapper');
        const dialog = document.getElementById('edit-dialog');

        // 2. 渲染函数
        function render() {
            wrapper.innerHTML = '';
            bookmarks.forEach((item, i) => {
                const a = document.createElement('a');
                a.className = 'link-item';
                a.href = isEdit ? 'javascript:void(0)' : item.url;
                if(!isEdit) a.target = "_blank";
                
                const isImg = item.icon.includes('http') || item.icon.includes('.');
                const iconHtml = isImg ? `<img src="${item.icon}">` : `<mdui-icon name="${item.icon}"></mdui-icon>`;
                
                a.innerHTML = `${iconHtml}<span>${item.name}</span>`;
                a.onclick = () => { if(isEdit) openDialog(i); };
                wrapper.appendChild(a);
            });
            document.getElementById('main-container').classList.toggle('edit-active', isEdit);
            document.getElementById('add-btn').style.display = isEdit ? 'inline-block' : 'none';
        }

        // 3. 管理逻辑
        document.getElementById('edit-btn').onclick = () => { isEdit = !isEdit; render(); };
        document.getElementById('add-btn').onclick = () => openDialog();

        function openDialog(idx = null) {
            curIdx = idx;
            if(idx !== null) {
                document.getElementById('f-name').value = bookmarks[idx].name;
                document.getElementById('f-url').value = bookmarks[idx].url;
                document.getElementById('f-icon').value = bookmarks[idx].icon;
                document.getElementById('act-del').style.display = 'block';
            } else {
                document.getElementById('f-name').value = '';
                document.getElementById('f-url').value = '';
                document.getElementById('f-icon').value = '';
                document.getElementById('act-del').style.display = 'none';
            }
            dialog.open = true;
        }

        document.getElementById('act-save').onclick = () => {
            const data = {
                name: document.getElementById('f-name').value || '未命名',
                url: document.getElementById('f-url').value || '#',
                icon: document.getElementById('f-icon').value || 'link'
            };
            if(curIdx !== null) bookmarks[curIdx] = data;
            else bookmarks.push(data);
            save();
        };

        document.getElementById('act-del').onclick = () => {
            if(curIdx !== null) { bookmarks.splice(curIdx, 1); save(); }
        };

        function save() {
            localStorage.setItem('bp_nav_v2', JSON.stringify(bookmarks));
            dialog.open = false;
            render();
        }

        // 4. 天气 API
        const apiUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=sc';
        const warningApiUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warningInfo&lang=tc';
        const iUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=sc';

        async function fetchWeather() {
            try {
                const [wRes, wrRes, iRes] = await Promise.all([fetch(apiUrl), fetch(warningApiUrl), fetch(iUrl)]);
                const w = await wRes.json();
                const wr = await wrRes.json();
                const i = await iRes.json();

                document.getElementById('weather-info').innerHTML = `
                    <p><strong>总体情况：</strong>${w.generalSituation}</p>
                    <p><strong>天气预测：</strong>${w.forecastDesc}</p>
                    <p><strong>展望：</strong>${w.outlook}</p>
                `;
                
                if (wr.details) {
                    document.getElementById('warning-info').innerHTML = wr.details.map(d => `<p>⚠️ ${d.contents.join(' ')}</p>`).join('');
                }
                
                if (i.swt) {
                    document.getElementById('i-info').innerHTML = i.swt.map(s => `<p>ℹ️ ${s.desc}</p>`).join('');
                }
            } catch (err) { console.error("天气加载失败"); }
        }

        // 5. 搜索与主题
        document.getElementById('search-input').onkeypress = (e) => {
            if(e.key === 'Enter') window.open('https://www.google.com/search?q=' + encodeURIComponent(e.target.value), '_blank');
        };

        document.getElementById('theme-btn').onclick = () => {
            const html = document.documentElement;
            const isDark = html.classList.toggle('mdui-theme-dark');
            html.classList.toggle('mdui-theme-light', !isDark);
            document.getElementById('theme-btn').icon = isDark ? 'dark_mode' : 'light_mode';
        };

        render();
        fetchWeather();
    </script>
</body>
</html>
