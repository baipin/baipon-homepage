<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百品导航 - 123</title>
    
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    <script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
    
    <style>
        :root { 
            --nav-height: 64px; 
            --hero-height: 45vh; 
            --max-width: 1240px;
            /* 磨砂玻璃底层变量 */
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        .mdui-theme-dark {
            --glass-bg: rgba(45, 45, 50, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* --- 1. 全局背景与布局容器 --- */
        html, body { margin: 0; padding: 0; min-height: 100vh; background-color: transparent !important; }
        
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('/home.jpg') center/cover no-repeat; z-index: -2;
        }

        /* --- 2. 导航栏修复 (Logo + 文字) --- */
        .app-bar {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height);
            z-index: 1100; display: flex; align-items: center; padding: 0 5%;
            background: var(--glass-bg) !important; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            color: var(--mdui-color-on-surface);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .logo-area img { height: 28px; }
        .logo-area span { font-weight: 900; font-size: 1.2rem; letter-spacing: 1px; }

        /* --- 3. Hero 搜索区 (修复下拉框被挡住) --- */
        .hero-space { height: var(--hero-height); display: flex; align-items: center; justify-content: center; padding-top: var(--nav-height); }
        .search-container {
            width: 90%; max-width: 650px; 
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 50px; padding: 6px 18px; 
            display: flex; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: visible; /* 关键：允许下拉菜单溢出容器 */
            position: relative;
        }
        .search-input { 
            flex: 1; border: none; background: transparent; padding: 12px; 
            font-size: 1.1rem; outline: none; color: inherit;
        }

        /* --- 4. 卡片样式 (磨砂玻璃持久化) --- */
        .card-glass {
            border-radius: 28px; background: var(--glass-bg); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 32px; border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            color: var(--mdui-color-on-surface);
        }

        .content-layout {
            max-width: var(--max-width); margin: 0 auto 80px;
            display: grid; grid-template-columns: 1fr 360px; gap: 32px; padding: 0 20px;
        }

        /* --- 5. 书签网格 --- */
        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 18px; margin-top: 24px; }
        .link-item {
            position: relative; display: flex; flex-direction: column; align-items: center;
            padding: 20px 10px; border-radius: 20px; background: rgba(128,128,128,0.08);
            text-decoration: none; color: inherit; transition: all 0.2s;
        }
        .link-item:hover { transform: translateY(-5px); background: rgba(128,128,128,0.15); }
        .link-item img, .link-item mdui-icon { width: 32px; height: 32px; font-size: 32px; margin-bottom: 12px; border-radius: 6px; }
        .link-item span { font-size: 0.85rem; font-weight: 600; text-align: center; }

        .edit-active .link-item::after {
            content: "edit"; font-family: 'Material Icons'; position: absolute; top: 8px; right: 8px;
            font-size: 10px; background: #2196f3; color: white; border-radius: 50%; padding: 4px;
        }

        /* --- 6. 天气组件 --- */
        .weather-info p { margin: 8px 0; font-size: 0.9rem; line-height: 1.6; }
        .weather-info strong { color: #2196f3; }

        @media (max-width: 900px) {
            .content-layout { grid-template-columns: 1fr; }
            .side-stack { order: -1; }
            :root { --hero-height: 35vh; }
        }
    </style>
</head>
<body class="mdui-theme-auto">

    <header class="app-bar">
        <a href="/" class="logo-area">
            <img src="/logo.png" alt="Logo">
            <span>导航</span>
        </a>
        <div style="flex-grow: 1"></div>
        <mdui-button-icon id="theme-btn" icon="light_mode"></mdui-button-icon>
        <mdui-button-icon id="edit-btn" icon="edit_note"></mdui-button-icon>
    </header>

    <section class="hero-space">
        <div class="search-container">
            <mdui-dropdown id="engine-dropdown">
                <mdui-button-icon slot="trigger" icon="search" id="engine-icon-display"></mdui-button-icon>
                <mdui-menu id="engine-menu">
                    <mdui-menu-item value="google">Google</mdui-menu-item>
                    <mdui-menu-item value="baidu">Baidu</mdui-menu-item>
                    <mdui-menu-item value="bing">Bing</mdui-menu-item>
                    <mdui-menu-item value="github">GitHub</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>
            <input type="text" class="search-input" id="search-input" placeholder="键入以搜索...">
        </div>
    </section>

    <div class="content-layout">
        <main class="card-glass" id="main-container">
            <div style="display:flex; align-items:center; justify-content:space-between;">
                <div style="font-size: 1.3rem; font-weight: 900;">快捷访问</div>
                <mdui-button-icon id="add-btn" icon="add" style="display:none"></mdui-button-icon>
            </div>
            <div class="links-grid" id="links-wrapper"></div>
        </main>

        <aside class="side-stack" style="display:flex; flex-direction:column; gap:24px;">
            <div class="card-glass" style="padding:24px;">
                <div style="font-size:0.7rem; opacity:0.5; font-weight:bold; margin-bottom:12px; text-transform:uppercase;">拾遗</div>
                <div id="jinrishici-sentence" style="font-family: serif; font-style: italic; font-size: 1.1rem; line-height: 1.6;">正在加载诗词...</div>
            </div>

            <div class="card-glass" style="padding:24px;">
                <div style="font-size:0.7rem; opacity:0.5; font-weight:bold; margin-bottom:12px;">香港天文台天气</div>
                <div id="weather-info" class="weather-info">正在获取数据...</div>
                <div id="warning-info" style="color:#f44336; font-size:0.85rem; margin-top:10px; font-weight:bold;"></div>
                <div id="i-info" style="font-size:0.85rem; opacity:0.8; margin-top:8px;"></div>
            </div>
        </aside>
    </div>

    <mdui-dialog id="edit-dialog" close-on-overlay-click>
        <span slot="headline">管理书签</span>
        <div style="display:flex; flex-direction:column; gap:20px; padding:10px 0;">
            <mdui-text-field label="名称" id="f-name"></mdui-text-field>
            <mdui-text-field label="链接 (URL)" id="f-url"></mdui-text-field>
            <mdui-text-field label="图标 (MDUI名或图片URL)" id="f-icon"></mdui-text-field>
        </div>
        <mdui-button slot="action" variant="text" id="act-del" style="color:red">删除</mdui-button>
        <mdui-button slot="action" variant="tonal" id="act-save">保存</mdui-button>
    </mdui-dialog>

    <script>
        /* --- 1. 数据初始化 --- */
        const initialLinks = [
            { name: "我的RSS", url: "#", icon: "rss_feed" },
            { name: "香港01", url: "https://www.hk01.com", icon: "https://www.hk01.com/favicon.ico" },
            { name: "酷安", url: "https://www.coolapk.com", icon: "https://www.coolapk.com/favicon.ico" },
            { name: "知乎", url: "https://www.zhihu.com", icon: "https://www.zhihu.com/favicon.ico" },
            { name: "Now新闻", url: "#", icon: "newspaper" },
            { name: "unsplash", url: "https://unsplash.com", icon: "image" },
            { name: "豆瓣", url: "https://www.douban.com", icon: "https://www.douban.com/favicon.ico" },
            { name: "翻译", url: "https://translate.google.com", icon: "translate" },
            { name: "斗鱼", url: "https://www.douyu.com", icon: "https://www.douyu.com/favicon.ico" },
            { name: "CSDN", url: "https://www.csdn.net", icon: "https://www.csdn.net/favicon.ico" },
            { name: "XDA", url: "https://www.xda-developers.com", icon: "developer_mode" },
            { name: "百品博客", url: "https://baipin.pw", icon: "article" },
            { name: "AIMS", url: "#", icon: "school" },
            { name: "学校邮箱", url: "#", icon: "mail" },
            { name: "Canvas", url: "#", icon: "dashboard" },
            { name: "应用面板", url: "#", icon: "apps" },
            { name: "Github", url: "https://github.com", icon: "code" }
        ];

        let bookmarks = JSON.parse(localStorage.getItem('bp_data_v3')) || initialLinks;
        let editMode = false;
        let currentIdx = null;

        const wrapper = document.getElementById('links-wrapper');
        const dialog = document.getElementById('edit-dialog');

        /* --- 2. 渲染引擎 --- */
        function render() {
            wrapper.innerHTML = '';
            bookmarks.forEach((item, i) => {
                const el = document.createElement('a');
                el.className = 'link-item';
                el.href = editMode ? 'javascript:void(0)' : item.url;
                if(!editMode) el.target = "_blank";
                
                const isImg = item.icon.includes('http') || item.icon.includes('.');
                const iconHtml = isImg ? `<img src="${item.icon}">` : `<mdui-icon name="${item.icon}"></mdui-icon>`;
                
                el.innerHTML = `${iconHtml}<span>${item.name}</span>`;
                el.onclick = () => { if(editMode) openDialog(i); };
                wrapper.appendChild(el);
            });
            document.getElementById('main-container').classList.toggle('edit-active', editMode);
            document.getElementById('add-btn').style.display = editMode ? 'inline-block' : 'none';
        }

        /* --- 3. 书签管理逻辑 --- */
        document.getElementById('edit-btn').onclick = () => { editMode = !editMode; render(); };
        document.getElementById('add-btn').onclick = () => openDialog();

        function openDialog(idx = null) {
            currentIdx = idx;
            if(idx !== null) {
                document.getElementById('f-name').value = bookmarks[idx].name;
                document.getElementById('f-url').value = bookmarks[idx].url;
                document.getElementById('f-icon').value = bookmarks[idx].icon;
                document.getElementById('act-del').style.display = 'block';
            } else {
                document.getElementById('f-name').value = '';
                document.getElementById('f-url').value = '';
                document.getElementById('f-icon').value = '';
                document.getElementById('act-del').style.display = 'none';
            }
            dialog.open = true;
        }

        document.getElementById('act-save').onclick = () => {
            const data = {
                name: document.getElementById('f-name').value || '未命名',
                url: document.getElementById('f-url').value || '#',
                icon: document.getElementById('f-icon').value || 'link'
            };
            if(currentIdx !== null) bookmarks[currentIdx] = data;
            else bookmarks.push(data);
            save();
        };

        document.getElementById('act-del').onclick = () => {
            if(currentIdx !== null) { bookmarks.splice(currentIdx, 1); save(); }
        };

        function save() {
            localStorage.setItem('bp_data_v3', JSON.stringify(bookmarks));
            dialog.open = false;
            render();
        }

        /* --- 4. 搜索功能与引擎切换 --- */
        let activeEngine = 'google';
        const engines = {
            google: 'https://www.google.com/search?q=',
            baidu: 'https://www.baidu.com/s?wd=',
            bing: 'https://cn.bing.com/search?q=',
            github: 'https://github.com/search?q='
        };

        document.getElementById('engine-menu').addEventListener('change', (e) => {
            activeEngine = e.target.value;
            const iconMap = { google: 'search', baidu: 'language', bing: 'cloud', github: 'code' };
            document.getElementById('engine-icon-display').icon = iconMap[activeEngine];
        });

        document.getElementById('search-input').onkeypress = (e) => {
            if(e.key === 'Enter') {
                const query = e.target.value.trim();
                if(query) window.open(engines[activeEngine] + encodeURIComponent(query), '_blank');
            }
        };

        /* --- 5. 香港天文台天气 API --- */
        const apiUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=sc';
        const warningApiUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warningInfo&lang=tc';
        const iUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=sc';

        async function fetchWeather() {
            try {
                const [wRes, wrRes, iRes] = await Promise.all([fetch(apiUrl), fetch(warningApiUrl), fetch(iUrl)]);
                const w = await wRes.json();
                const wr = await wrRes.json();
                const i = await iRes.json();

                document.getElementById('weather-info').innerHTML = `
                    <p><strong>总体情况：</strong>${w.generalSituation}</p>
                    <p><strong>天气预测：</strong>${w.forecastDesc}</p>
                `;
                if(wr.details) document.getElementById('warning-info').innerHTML = wr.details.map(d => `<p>⚠️ ${d.contents.join(' ')}</p>`).join('');
                if(i.swt) document.getElementById('i-info').innerHTML = i.swt.map(s => `<p>ℹ️ ${s.desc}</p>`).join('');
            } catch (err) { console.error("Weather failed to load"); }
        }

        /* --- 6. 主题切换 --- */
        document.getElementById('theme-btn').onclick = () => {
            const html = document.documentElement;
            const isDark = html.classList.toggle('mdui-theme-dark');
            html.classList.toggle('mdui-theme-light', !isDark);
            document.getElementById('theme-btn').icon = isDark ? 'dark_mode' : 'light_mode';
        };

        render();
        fetchWeather();
    </script>
</body>
</html>
