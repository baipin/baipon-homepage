<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>项目 - 百品</title>
    
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    
    <style>
        :root {
            --nav-height: 64px;
            --content-max-width: 1200px;
        }

        /* --- 1. 全局背景逻辑 (修复初次进入透明问题) --- */
        html {
            /* 使用 MDUI 变量作为底色，确保初次加载非透明 */
            background-color: rgb(var(--mdui-color-background));
            transition: background-color 0.3s;
        }

        body {
            margin: 0; padding: 0;
            width: 100%; overflow-x: hidden;
            font-family: "Product Sans", system-ui, -apple-system, sans-serif;
            background-color: transparent !important;
            padding-top: var(--nav-height);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('/home.jpg') center/cover no-repeat;
            z-index: -1;
            transition: filter 0.5s ease;
        }
        /* 自动/手动深色模式下的背景压暗 */
        .mdui-theme-dark body::before { filter: brightness(0.5); }
        @media (prefers-color-scheme: dark) {
            .mdui-theme-auto body::before { filter: brightness(0.5); }
        }

        /* --- 2. 导航栏 (保持与 Index 一致) --- */
        .custom-app-bar {
            height: var(--nav-height) !important;
            background-color: rgba(var(--mdui-color-surface-container), 0.85) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(var(--mdui-color-outline-variant), 0.2);
            padding: 0 5%;
            display: flex; align-items: center;
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 1000;
            box-sizing: border-box;
            transition: all 0.3s;
            color: rgb(var(--mdui-color-on-surface));
        }

        .nav-logo { height: 28px; width: auto; cursor: pointer; flex-shrink: 0; }
        .nav-links-container { margin-left: 20px; display: flex; gap: 4px; }

        /* --- 3. 内容容器 --- */
        .project-container {
            max-width: 800px; /* 链接列表页建议窄一点，视觉更集中 */
            margin: 60px auto 80px;
            padding: 0 20px;
            position: relative;
            z-index: 30;
        }

        .main-card {
            /* 核心：使用变量确保初次进入有颜色 */
            background-color: rgb(var(--mdui-color-surface-container)) !important;
            color: rgb(var(--mdui-color-on-surface));
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }

        /* --- 4. 项目链接卡片 --- */
        .project-link-item {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            background: rgba(var(--mdui-color-secondary-container), 0.2);
            border: 1px solid rgba(var(--mdui-color-outline), 0.05);
            transition: all 0.3s ease;
        }

        .project-link-item:hover {
            background: rgba(var(--mdui-color-secondary-container), 0.5);
            transform: translateY(-3px);
        }

                /* 禁用状态的卡片样式 */
        .card-disabled {
            /* 核心：禁止一切鼠标操作（点击、悬停、跳转） */
            pointer-events: none; 
            
            /* 视觉：变黑/变灰 */
            filter: grayscale(1) brightness(0.6); 
            opacity: 0.6;
            
            /* 可选：改变光标形状（虽然被 pointer-events 拦截了，但作为保险） */
            cursor: not-allowed;
            
            /* 移除悬停时的位移效果 */
            transform: none !important;
            box-shadow: none !important;
        }
        
        /* 如果是黑夜模式，可能需要更暗一点 */
        .mdui-theme-dark .card-disabled {
            filter: grayscale(1) brightness(0.3);
        }

        .project-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: rgb(var(--mdui-color-primary));
            color: rgb(var(--mdui-color-on-primary));
            display: flex; align-items: center; justify-content: center;
            margin-right: 20px; flex-shrink: 0;
        }

        .project-text h4 { margin: 0; font-size: 1.1rem; font-weight: 700; }
        .project-text p { margin: 4px 0 0; font-size: 0.85rem; opacity: 0.7; }

        /* 移动端适配 */
        @media (max-width: 900px) {
            .nav-links-container { display: none; }
            .mobile-menu-btn { display: inline-flex !important; }
            .main-card { padding: 24px; }
        }
        .mobile-menu-btn { display: none; }
        footer { padding: 40px; text-align: center; color: #777; }
    </style>
</head>
<body class="mdui-theme-auto">

    <mdui-navigation-drawer id="drawer" placement="right" close-on-overlay-click>
        <div style="padding: 24px;"><h2 style="margin:0; font-weight:900;">MENU</h2></div>
        <mdui-list id="drawer-list">
            <mdui-list-item icon="home" href="/index.html" data-i18n="nav_home">首页</mdui-list-item>
            <mdui-list-item icon="auto_stories" href="https://baipin.pw" data-i18n="nav_blog">博客</mdui-list-item>
            <mdui-list-item icon="terminal" href="projects.html" data-i18n="nav_projects">项目</mdui-list-item>
            <mdui-list-item icon="account_circle" href="https://baipin.pw/about" data-i18n="nav_about">关于</mdui-list-item>
        </mdui-list>
    </mdui-navigation-drawer>

    <header class="custom-app-bar">
        <img src="/logo.png" alt="Logo" class="nav-logo" onclick="window.location.href='/index.html'">
        
        <div class="nav-links-container">
            <mdui-button variant="text" href="/index.html"><mdui-icon slot="icon" name="home"></mdui-icon><span data-i18n="nav_home">首页</span></mdui-button>
            <mdui-button variant="text" href="https://baipin.pw"><mdui-icon slot="icon" name="auto_stories"></mdui-icon><span data-i18n="nav_blog">博客</span></mdui-button>
            <mdui-button variant="text" href="projects.html"><mdui-icon slot="icon" name="terminal"></mdui-icon><span data-i18n="nav_projects">项目</span></mdui-button>
            <mdui-button variant="text" href="https://baipin.pw/about"><mdui-icon slot="icon" name="account_circle"></mdui-icon><span data-i18n="nav_about">关于</span></mdui-button>
        </div>

        <div style="flex-grow: 1"></div>
        
        <mdui-button-icon id="theme-toggle" icon="light_mode"></mdui-button-icon>
        <mdui-button-icon icon="translate" id="lang-btn"></mdui-button-icon>
        <mdui-button-icon icon="menu" class="mobile-menu-btn" onclick="document.getElementById('drawer').open = true"></mdui-button-icon>
    </header>

    <div class="project-container">
        <main class="main-card">
            <h2 style="margin-top:0; font-weight:900;" data-i18n="nav_projects">项目</h2>

            <a href="https://baipin.pw" class="project-link-item">
                <div class="project-icon"><mdui-icon name="book_ribbon"></mdui-icon></div>
                <div class="project-text">
                    <h4 data-i18n="p1_title">百品博客</h4>
                    <p data-i18n="p1_desc">站长的个人博客。</p>
                </div>
            </a>
            
            <a href="https://123.baipon.com" class="project-link-item">
                <div class="project-icon"><mdui-icon name="assistant_navigation"></mdui-icon></div>
                <div class="project-text">
                    <h4 data-i18n="p2_title">百品导航</h4>
                    <p data-i18n="p2_desc">简洁的客制化上网首页。包含RSS订阅、自定义书签、自定义搜索引擎、自定义背景、夜间模式。同时支持导入导出所有自定义设置。</p>
                </div>
            </a>

            <a href="https://radio.baipon.com" class="project-link-item">
                <div class="project-icon"><mdui-icon name="radio"></mdui-icon></div>
                <div class="project-text">
                    <h4 data-i18n="p3_title">百品电台</h4>
                    <p data-i18n="p3_desc">轻量化在线客制化电台，支持批量导入电台源。</p>
                </div>
            </a>

            <a href="https://kg.baipon.com" class="project-link-item">
                <div class="project-icon"><mdui-icon name="local_florist"></mdui-icon></div>
                <div class="project-text">
                    <h4 data-i18n="p4_title">知识花园</h4>
                    <p data-i18n="p4_desc">使用AI Agent自动整理日常想法及知识点，生成思维导图和PPT。</p>
                </div>
            </a>

           <a href="https://bbs.baipin.pw" class="project-link-item card-disabled">
                <div class="project-icon" style="background: #444;"><mdui-icon name="forum"></mdui-icon></div>
                <div class="project-text">
                    <h4 style="color: #888;" data-i18n="p5_title">百品论坛</h4>
                <p data-i18n="p5_desc">该项目已于2018年停止。</p>
                    </div>
</a>
           <a href="https://tv.baipin.pw" class="project-link-item card-disabled">
                <div class="project-icon" style="background: #444;"><mdui-icon name="live_tv"></mdui-icon></div>
                <div class="project-text">
                    <h4 style="color: #888;" data-i18n="p6_title">百品网络电视</h4>
                <p data-i18n="p6_desc">该项目已于2026年4月21日正式停止。</p>
                    </div>
</a>
            <a href="javascript:void(0);" class="project-link-item card-disabled">
                <div class="project-icon" style="background: #444;"><mdui-icon name="live_tv"></mdui-icon></div>
                <div class="project-text">
                    <h4 style="color: #888;" data-i18n="p7_title">百品MC助手</h4>
                <p data-i18n="p7_desc">我的世界（Minecraft）资讯站，该项目已于2018年终止。</p>
                    </div>
</a>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 BAIPIN.PW</p>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        const drawer = document.getElementById('drawer');

        // --- 主题逻辑 ---
        function updateIcon() {
            const isDark = html.classList.contains('mdui-theme-dark') || 
                          (html.classList.contains('mdui-theme-auto') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            themeToggle.icon = isDark ? 'dark_mode' : 'light_mode';
        }

        function applyTheme(theme) {
            html.classList.remove('mdui-theme-light', 'mdui-theme-dark', 'mdui-theme-auto');
            html.classList.add(`mdui-theme-${theme}`);
            updateIcon();
        }

        themeToggle.addEventListener('click', () => {
            const isCurrentlyDark = html.classList.contains('mdui-theme-dark') || 
                                   (html.classList.contains('mdui-theme-auto') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            const nextTheme = isCurrentlyDark ? 'light' : 'dark';
            applyTheme(nextTheme);
            localStorage.setItem('theme', nextTheme);
        });

        // --- 多语言逻辑 (i18n) ---
        const i18n = {
            'zh-CN': {
                nav_home: '首页', 
                nav_blog: '博客', 
                nav_projects: '项目', 
                nav_about: '关于',
                // 项目标题
                p1_title: '百品博客',
                p2_title: '百品导航',
                p3_title: '百品电台',
                p4_title: '知识花园',
                // 项目描述
                p1_desc: '站长的个人博客。',
                p2_desc: '简洁的客制化上网首页。包含RSS订阅、自定义书签、自定义搜索引擎、自定义背景、夜间模式。同时支持导入导出所有自定义设置。',
                p3_desc: '轻量化在线客制化电台，支持批量导入电台源。',
                p4_desc: '使用AI Agent自动整理日常想法及知识点，生成思维导图和PPT。',
                p5_title: '百品论坛', p5_desc: '该项目已于2018年停止。',
                p6_title: '百品网络电视', p6_desc: '该项目已于2026年4月21日正式停止。',
                p7_title: '百品MC助手', p7_desc: '我的世界（Minecraft）资讯站，该项目已于2018年终止。'
            },
            'en': {
                nav_home: 'Home', 
                nav_blog: 'Blog', 
                nav_projects: 'Projects', 
                nav_about: 'About',
                // Project Titles
                p1_title: 'Baipin Blog',
                p2_title: 'Baipin Navigation',
                p3_title: 'Baipin Radio',
                p4_title: 'Knowledge Garden',
                // Project Descs
                p1_desc: 'The personal blog of the site owner.',
                p2_desc: 'A concise customized homepage. Features RSS, custom bookmarks, search engines, backgrounds, and dark mode. Supports full settings export/import.',
                p3_desc: 'Lightweight online customized radio, supports batch importing station sources.',
                p4_desc: 'Using AI Agents to organize daily thoughts and knowledge points, generating mind maps and PPTs.',
                p5_title: 'Baipin Forum', p5_desc: 'This project was discontinued in 2018.',
                p6_title: 'Baipin Web TV', p6_desc: 'This project officially ended on April 21, 2026.',
                p7_title: 'Baipin MC Helper', p7_desc: 'Minecraft info station, discontinued in 2018.'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'zh-CN';
        function applyLang(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerText = i18n[lang][key];
            });
        }

        document.getElementById('lang-btn').addEventListener('click', () => {
            currentLang = currentLang === 'zh-CN' ? 'en' : 'zh-CN';
            applyLang(currentLang);
            localStorage.setItem('lang', currentLang);
        });

        // 初始化
        document.getElementById('drawer-list').addEventListener('click', () => { drawer.open = false; });
        const savedTheme = localStorage.getItem('theme') || 'auto';
        applyTheme(savedTheme);
        applyLang(currentLang);
    </script>
</body>
</html>
