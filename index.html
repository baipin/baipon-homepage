<!DOCTYPE html>
<html lang="zh-CN" class="mdui-theme-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百品 - 个人主页</title>
    
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    
    <style>
        :root {
            --mdui-color-background: #ffffff;
            --nav-height: 64px;
        }

        body {
            background-color: var(--mdui-color-background);
            margin: 0;
            padding-top: var(--nav-height);
            font-family: "Product Sans", system-ui, -apple-system, sans-serif;
            overflow-x: hidden; /* 彻底防止水平溢出 */
        }

        /* 修复后的导航栏：使用 left/right:0 替代 width:100% 避免 Padding 导致的溢出 */
        .custom-app-bar {
            height: var(--nav-height) !important;
            background-color: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding: 0 5%;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-logo {
            height: 32px;
            cursor: pointer;
        }

        .nav-links-container {
            display: flex;
            gap: 8px;
            margin-left: 20px;
        }

        /* Hero Section - 风格大图 */
        .hero-section {
            width: 100%;
            height: 80vh;
            background: url('/home.jpg') center/cover no-repeat;
        }

        /* 浮动容器布局 */
        .floating-container {
            max-width: 1200px;
            margin: -120px auto 60px;
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 32px;
            padding: 0 20px;
        }

        .main-card {
            background: white;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
        }

        .sidebar-card {
            background: #fafafa;
            padding: 40px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            height: fit-content;
            text-align: center;
        }

        /* RSS 列表 */
        .rss-item {
            display: block;
            padding: 18px;
            border-radius: 12px;
            background: #fcfcfc;
            border: 1px solid #f0f0f0;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }
        .rss-item:hover {
            background: white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }

        footer {
            background: #121212;
            color: #777;
            padding: 60px 5% 40px;
            text-align: center;
        }

        @media (max-width: 900px) {
            .floating-container { grid-template-columns: 1fr; margin-top: -80px; }
            .sidebar-card { order: -1; }
            .nav-links-container { display: none; }
        }
    </style>
</head>
<body>

    <header class="custom-app-bar">
        <img src="/logo.png" alt="Logo" class="nav-logo" onclick="window.location.href='#'">
        
        <div class="nav-links-container">
            <mdui-button variant="text" href="#">
                <mdui-icon slot="icon" name="home"></mdui-icon>
                <span data-i18n="nav_home">首页</span>
            </mdui-button>
            <mdui-button variant="text" href="https://baipin.pw">
                <mdui-icon slot="icon" name="auto_stories"></mdui-icon>
                <span data-i18n="nav_blog">博客</span>
            </mdui-button>
            <mdui-button variant="text" href="#projects">
                <mdui-icon slot="icon" name="terminal"></mdui-icon>
                <span data-i18n="nav_projects">项目</span>
            </mdui-button>
            <mdui-button variant="text" href="https://baipin.pw/about">
                <mdui-icon slot="icon" name="account_circle"></mdui-icon>
                <span data-i18n="nav_about">关于</span>
            </mdui-button>
        </div>

        <div style="flex-grow: 1"></div>
        <mdui-button-icon icon="translate" id="lang-btn"></mdui-button-icon>
    </header>

    <section class="hero-section"></section>

    <div class="floating-container">
        <main class="main-card">
            <h1 style="font-size: 2.8rem; margin: 0 0 20px 0; font-weight: 800;" data-i18n="hero_title">
                图片/浙江丽水云和梯田
            </h1>
            <p style="color: #555; font-size: 1.15rem; line-height: 1.8; margin-bottom: 32px;" data-i18n="hero_desc">
                这里是 百品 (Baipin) 的入口。我是一名学生，热爱技术与文字，目前致力于探索更有趣的 Web 体验。
            </p>
            
            <div style="display: flex; gap: 16px;">
                <mdui-button variant="filled" href="https://baipin.pw" style="height: 48px; padding: 0 24px;" data-i18n="nav_blog">
                    进入博客
                </mdui-button>
                <mdui-button variant="outlined" href="https://baipin.pw/about" style="height: 48px; padding: 0 24px;" data-i18n="nav_about">
                    关于我
                </mdui-button>
            </div>

            <mdui-divider style="margin: 48px 0;"></mdui-divider>

            <h3 style="display: flex; align-items: center; gap: 10px; margin-bottom: 24px;">
                <mdui-icon name="rss_feed" style="color: #f26522;"></mdui-icon> 
                <span data-i18n="news_title">最新文章</span>
            </h3>
            <div id="rss-feed-container">
                <div style="padding: 20px; text-align: center;"><mdui-circular-progress></mdui-circular-progress></div>
            </div>
        </main>

        <aside class="sidebar-card">
            <img src="https://github.com/baipin.png" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; box-shadow: 0 8px 16px rgba(0,0,0,0.1); margin-bottom: 20px;">
            <h2 style="margin: 0; font-weight: 700;">Baipin</h2>
            <p style="color: #888; margin-top: 8px; font-size: 0.95rem;" data-i18n="bio">Student / Dennis</p>
            
            <mdui-divider style="margin: 24px 0;"></mdui-divider>

            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;">
                <mdui-button-icon icon="code_xml" href="https://github.com/baipin" title="GitHub"></mdui-button-icon>
                <mdui-button-icon icon="telegram" href="https://t.me/baipin_pw" title="Telegram"></mdui-button-icon>
                <mdui-button-icon icon="mail_outline" href="mailto:root@baipin.pw" title="Email"></mdui-button-icon>
                <mdui-button-icon icon="rss_feed" href="https://baipin.pw/feed" title="RSS"></mdui-button-icon>
                <mdui-button-icon icon="link" href="https://baipin.pw" title="Website"></mdui-button-icon>
            </div>

            <mdui-button variant="tonal" full-width style="border-radius: 12px;" href="https://baipin.pw/about" data-i18n="btn_follow">
                关于我
            </mdui-button>
        </aside>
    </div>

    <footer>
        <div style="max-width: 1200px; margin: 0 auto;">
            <div style="font-weight: 900; font-size: 1.4rem; color: #fff; margin-bottom: 12px; letter-spacing: 2px;">BAIPIN.PW</div>
            <p style="font-size: 0.85rem;">&copy; 2026 百品.</p>
        </div>
    </footer>

    <script>
        // 1. 多语言
        const i18n = {
            'zh-CN': {
                nav_home: '首页', nav_blog: '博客', nav_projects: '项目', nav_about: '关于',
                hero_title: '我欲穿花寻路，直入白云深处。',
                hero_desc: '这里是 百品 (Baipin) 的入口。欢迎访问相关页面。',
                news_title: '最新文章', bio: '学生', btn_follow: '关于我'
            },
            'en': {
                nav_home: 'Home', nav_blog: 'Blog', nav_projects: 'Projects', nav_about: 'About',
                hero_title: 'Seeking paths through flowers, straight into the deep clouds.',
                hero_desc: 'Welcome to Baipin. I am a student, passionate about tech and writing.',
                news_title: 'Latest Posts', bio: 'Student', btn_follow: 'About Me'
            }
        };

        let currentLang = 'zh-CN';
        document.getElementById('lang-btn').addEventListener('click', () => {
            currentLang = currentLang === 'zh-CN' ? 'en' : 'zh-CN';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[currentLang][key];
            });
        });

        // 2. RSS (只负责动态部分)
        const RSS_URL = 'https://baipin.pw/feed';
        const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

        async function fetchRSS() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('rss-feed-container');
                container.innerHTML = '';
                
                data.items.slice(0, 6).forEach(item => {
                    const el = document.createElement('a');
                    el.className = 'rss-item';
                    el.href = item.link;
                    el.target = '_blank';
                    el.innerHTML = `
                        <div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 6px;">${item.title}</div>
                        <div style="font-size: 0.85rem; color: #999;">${new Date(item.pubDate).toLocaleDateString()}</div>
                    `;
                    container.appendChild(el);
                });
            } catch (e) {
                document.getElementById('rss-feed-container').innerHTML = '<p>无法连接至博客 Feed</p>';
            }
        }
        fetchRSS();
    </script>
</body>
</html>
