<!DOCTYPE html>
<html lang="zh-CN" class="mdui-theme-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百品 - 入口网站</title>
    
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    
    <style>
        :root {
            --mdui-color-background: #ffffff;
            --nav-height: 64px;
        }

        body {
            background-color: var(--mdui-color-background);
            margin: 0;
            font-family: "Product Sans", system-ui, -apple-system, sans-serif;
        }

        /* 修复后的导航栏 */
        .custom-app-bar {
            height: var(--nav-height) !important;
            background-color: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 0 5%;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .nav-logo {
            height: 32px;
            cursor: pointer;
        }

        .nav-links-container {
            display: flex;
            gap: 12px;
            margin-left: 24px;
        }

        /* Hero Section */
        .hero-section {
            width: 100%;
            height: 70vh;
            background: url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000') center/cover no-repeat;
        }

        /* 浮动容器 */
        .floating-container {
            max-width: 1200px;
            margin: -120px auto 60px;
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 32px;
            padding: 0 20px;
        }

        .main-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .sidebar-card {
            background: #fcfcfc;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            height: fit-content;
            text-align: center;
        }

        /* RSS 动态列表样式 */
        #rss-feed-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .rss-item {
            padding: 16px;
            border-radius: 8px;
            background: #f9f9f9;
            transition: 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .rss-item:hover { background: #f0f0f0; }

        /* 页脚 */
        footer {
            background: #1a1a1a;
            color: #ccc;
            padding: 60px 5% 30px;
            text-align: center;
        }

        @media (max-width: 900px) {
            .floating-container { grid-template-columns: 1fr; margin-top: -60px; }
            .sidebar-card { order: -1; }
        }
    </style>
</head>
<body>

    <header class="custom-app-bar">
        <img src="/logo.png" alt="Logo" class="nav-logo" onclick="window.location.href='#'">
        
        <div style="flex-grow: 1"></div>
        
        <div class="nav-links-container mdui-hidden-sm-down">
            <mdui-button variant="text" href="#" data-i18n="nav_home">首页</mdui-button>
            <mdui-button variant="text" href="https://baipin.pw" data-i18n="nav_blog">博客</mdui-button>
            <mdui-button variant="text" href="#projects" data-i18n="nav_projects">项目</mdui-button>
            <mdui-button variant="text" href="https://baipin.pw/about" data-i18n="nav_about">关于</mdui-button>
        </div>

        <mdui-button-icon icon="language" id="lang-btn" style="margin-left: 16px;"></mdui-button-icon>
    </header>

    <section class="hero-section"></section>

    <div class="floating-container">
        <main class="main-card">
            <h1 style="font-size: 2.5rem; margin: 0 0 24px 0;" data-i18n="hero_title">我欲穿花寻路，直入白云深处，<br>浩气展虹霓。</h1>
            <p style="color: #666; line-height: 1.8; margin-bottom: 32px;" data-i18n="hero_desc">
                欢迎来到 百品 的世界。
            </p>
            
            <div style="display: flex; gap: 12px;">
                <mdui-button variant="filled" href="#projects" data-i18n="btn_explore">浏览作品</mdui-button>
                <mdui-button variant="outlined" href="#about" data-i18n="btn_contact">关于我</mdui-button>
            </div>

            <mdui-divider style="margin: 40px 0;"></mdui-divider>

            <h3 style="display: flex; align-items: center; gap: 8px;">
                <mdui-icon name="rss_feed"></mdui-icon> <span data-i18n="news_title">最新动态</span>
            </h3>
            <div id="rss-feed-container">
                <div style="padding: 20px; text-align: center;"><mdui-circular-progress></mdui-circular-progress></div>
            </div>
        </main>

        <aside class="sidebar-card">
            <img src="https://api.dicebear.com/7.x/micah/svg?seed=Felix" style="width: 120px; border-radius: 50%; background: #eee; margin-bottom: 16px;">
            <h2 style="margin: 0;">Felix</h2>
            <p style="color: #888; font-size: 0.9rem;" data-i18n="bio">Web Developer & Designer</p>
            
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 24px 0;">
                <mdui-button-icon icon="facebook" title="Facebook"></mdui-button-icon>
                <mdui-button-icon icon="twitter" title="Twitter"></mdui-button-icon>
                <mdui-button-icon icon="telegram" title="Telegram"></mdui-button-icon>
                <mdui-button-icon icon="instagram" title="Instagram"></mdui-button-icon>
                <mdui-button-icon icon="linkedin" title="LinkedIn"></mdui-button-icon>
                <mdui-button-icon icon="github" title="GitHub"></mdui-button-icon>
                <mdui-button-icon icon="wechat" title="WeChat"></mdui-button-icon>
                <mdui-button-icon icon="email" title="Email"></mdui-button-icon>
            </div>

            <mdui-button variant="tonal" full-width data-i18n="btn_follow">关注我</mdui-button>
        </aside>
    </div>

    <footer>
        <div style="max-width: 1200px; margin: 0 auto;">
            <div style="font-weight: 900; font-size: 1.5rem; color: #fff; margin-bottom: 20px;">PORTFOLIO</div>
            <p style="font-size: 0.9rem;">&copy; 2026 Felix. All rights reserved.</p>
            <div style="margin-top: 20px;">
                <mdui-button variant="text" href="#" style="color: #888;">Privacy</mdui-button>
                <mdui-button variant="text" href="#" style="color: #888;">Terms</mdui-button>
            </div>
        </div>
    </footer>

    <script>
        // 1. 多语言配置
        const i18n = {
            'zh-CN': {
                nav_home: '首页', nav_blog: '博客', nav_projects: '项目', nav_about: '关于',
                hero_title: '致力于创造有温度的代码', hero_desc: '这里是我的个人实验室，记录关于技术、生活与思考的点滴。',
                btn_explore: '浏览作品', btn_contact: '关于我', news_title: '最新动态 (RSS)',
                bio: '开发者 & 设计师', btn_follow: '关注我'
            },
            'en': {
                nav_home: 'Home', nav_blog: 'Blog', nav_projects: 'Projects', nav_about: 'About',
                hero_title: 'Crafting Code with Warmth', hero_desc: 'This is my personal lab, documenting snippets of technology, life, and thoughts.',
                btn_explore: 'Explore', btn_contact: 'Contact', news_title: 'Latest Updates',
                bio: 'Developer & Designer', btn_follow: 'Follow'
            }
        };

        let currentLang = 'zh-CN';
        document.getElementById('lang-btn').addEventListener('click', () => {
            currentLang = currentLang === 'zh-CN' ? 'en' : 'zh-CN';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[currentLang][key];
            });
        });

        // 2. RSS 获取逻辑
        const RSS_URL = 'https://baipin.pw/feed';
        const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

        async function fetchRSS() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('rss-feed-container');
                container.innerHTML = '';
                
                data.items.slice(0, 3).forEach(item => {
                    const el = document.createElement('a');
                    el.className = 'rss-item';
                    el.href = item.link;
                    el.target = '_blank';
                    el.innerHTML = `
                        <div style="font-weight: 700; margin-bottom: 4px;">${item.title}</div>
                        <div style="font-size: 0.8rem; color: #888;">${new Date(item.pubDate).toLocaleDateString()}</div>
                    `;
                    container.appendChild(el);
                });
            } catch (e) {
                document.getElementById('rss-feed-container').innerHTML = '<p>无法加载动态</p>';
            }
        }
        
        fetchRSS();
    </script>
</body>
</html>
