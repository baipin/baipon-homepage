<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百品 - 入口网站</title>
    
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    
    <style>
        :root {
            --nav-height: 64px;
            --content-max-width: 1200px;
        }

        /* --- 1. 全局背景修复 --- */
        html {
            background-color: #fff;
            transition: background-color 0.3s;
            height: 100%;
        }
        html.mdui-theme-dark { background-color: #121212; }

        body {
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            font-family: "Product Sans", system-ui, -apple-system, sans-serif;
            background-color: transparent !important;
            padding-top: var(--nav-height);
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('/home.jpg') center/cover no-repeat;
            z-index: -1;
            transition: filter 0.5s ease;
        }
        .mdui-theme-dark body::before { filter: brightness(0.6) contrast(1.1); }

        /* --- 2. 导航栏样式彻底重构 (防止崩溃) --- */
        .custom-app-bar {
            height: var(--nav-height) !important;
            background-color: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding: 0 24px;
            display: flex; 
            flex-direction: row;
            align-items: center;
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 1100;
            box-sizing: border-box;
        }

        .mdui-theme-dark .custom-app-bar {
            background-color: rgba(28, 27, 31, 0.8) !important;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #fff;
        }

        .nav-logo { 
            height: 32px; 
            width: auto;
            flex-shrink: 0;
            cursor: pointer;
            margin-right: 24px;
        }

        .nav-links-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .spacer { flex-grow: 1; }

        /* --- 3. 容器与卡片修复 --- */
        .floating-container {
            max-width: var(--content-max-width);
            margin: -100px auto 60px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 32px;
            box-sizing: border-box;
        }

        .main-card {
            background: #ffffff !important;
            color: rgba(0,0,0,0.87) !important;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        .mdui-theme-dark .main-card {
            background: #1c1b1f !important;
            color: #e6e1e5 !important;
        }

        .sidebar-card {
            background: #fafafa !important;
            padding: 32px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }
        .mdui-theme-dark .sidebar-card {
            background: #2b2930 !important;
            color: #e6e1e5 !important;
        }

        /* 英雄区简介 */
        .hero-section {
            width: 100%; height: 75vh;
            display: flex; align-items: flex-end; justify-content: center;
        }

        .photo-info-box {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px 28px;
            margin-bottom: 140px;
            width: 90%;
            max-width: var(--content-max-width);
            display: flex; align-items: center; justify-content: space-between;
            color: white;
        }

        /* 移动端适配 */
        @media (max-width: 900px) {
            .nav-links-container { display: none; }
            .mobile-menu-btn { display: inline-flex !important; }
            .floating-container { grid-template-columns: 1fr; margin-top: -60px; }
            .sidebar-card { order: -1; }
            .hero-section { height: 65vh; }
        }

        .mobile-menu-btn { display: none; }
        footer { background: #121212; color: #777; padding: 40px 20px; text-align: center; }
    </style>
</head>
<body class="mdui-theme-auto">

    <mdui-navigation-drawer id="drawer" placement="right" close-on-overlay-click>
        <div style="padding: 24px;"><h2 style="margin:0; font-weight:900;">MENU</h2></div>
        <mdui-list id="drawer-list">
            <mdui-list-item icon="home" href="#">首页</mdui-list-item>
            <mdui-list-item icon="auto_stories" href="https://baipin.pw">博客</mdui-list-item>
            <mdui-list-item icon="terminal" href="#projects">项目</mdui-list-item>
            <mdui-list-item icon="account_circle" href="https://baipin.pw/about">关于</mdui-list-item>
        </mdui-list>
    </mdui-navigation-drawer>

    <header class="custom-app-bar">
        <img src="/logo.png" alt="Logo" class="nav-logo" onclick="window.location.href='#'">
        
        <nav class="nav-links-container">
            <mdui-button variant="text" href="#">首页</mdui-button>
            <mdui-button variant="text" href="https://baipin.pw">博客</mdui-button>
            <mdui-button variant="text" href="#projects">项目</mdui-button>
            <mdui-button variant="text" href="https://baipin.pw/about">关于</mdui-button>
        </nav>

        <div class="spacer"></div>
        
        <mdui-button-icon id="theme-toggle" icon="light_mode"></mdui-button-icon>
        <mdui-button-icon icon="translate" id="lang-btn"></mdui-button-icon>
        <mdui-button-icon icon="menu" class="mobile-menu-btn" id="open-drawer"></mdui-button-icon>
    </header>

    <section class="hero-section">
        <div class="photo-info-box">
            <div>
                <h4 style="margin:0">浙江丽水 · 云和梯田</h4>
                <p style="margin:4px 0 0; font-size:0.85rem; opacity:0.8">摄于2023年旅行时。</p>
            </div>
            <mdui-button variant="tonal" style="color: white; --mdui-color-secondary-container: rgba(255,255,255,0.15)" href="https://baipin.pw/">
                <mdui-icon slot="icon" name="arrow_forward"></mdui-icon>
            </mdui-button>
        </div>
    </section>

    <div class="floating-container">
        <main class="main-card">
            <h1 style="font-size: 2.2rem; margin-top: 0;">我欲穿花寻路，直入白云深处。</h1>
            <p style="font-size: 1.1rem; line-height: 1.7; opacity: 0.9;">
                欢迎来到百品的个人主页。
            </p>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <mdui-button variant="filled" href="https://baipin.pw">进入博客</mdui-button>
                <mdui-button variant="outlined" href="https://baipin.pw/about">关于我</mdui-button>
            </div>
            <mdui-divider style="margin: 32px 0;"></mdui-divider>
            <h3>最新文章</h3>
            <div id="rss-feed-container">加载中...</div>
        </main>

        <aside class="sidebar-card">
            <img src="https://github.com/baipin.png" style="width: 80px; border-radius: 50%; margin-bottom: 12px;">
            <h2 style="margin: 0;">Baipin</h2>
            <p style="color: #666; margin-bottom: 20px;">Student</p>
            <div style="display: flex; justify-content: center; gap: 8px; margin-bottom: 20px;">
                <mdui-button-icon icon="code" href="https://github.com/baipin"></mdui-button-icon>
                <mdui-button-icon icon="send" href="https://t.me/baipin_pw"></mdui-button-icon>
            </div>
            <mdui-button variant="tonal" full-width href="https://baipin.pw/about">了解更多</mdui-button>
        </aside>
    </div>

    <footer>
        <p>&copy; 2026 百品. All rights reserved.</p>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        const drawer = document.getElementById('drawer');

        document.getElementById('open-drawer').addEventListener('click', () => drawer.open = true);
        document.getElementById('drawer-list').addEventListener('click', () => drawer.open = false);

        function updateTheme() {
            const isDark = html.classList.contains('mdui-theme-dark') || 
                          (html.classList.contains('mdui-theme-auto') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            themeToggle.icon = isDark ? 'dark_mode' : 'light_mode';
        }

        function applyTheme(theme) {
            html.className = theme === 'auto' ? 'mdui-theme-auto' : `mdui-theme-${theme}`;
            updateTheme();
        }

        themeToggle.addEventListener('click', () => {
            const current = html.classList.contains('mdui-theme-dark') ? 'light' : 'dark';
            applyTheme(current);
            localStorage.setItem('theme', current);
        });

        const saved = localStorage.getItem('theme') || 'auto';
        applyTheme(saved);

        // RSS Fetch
        async function fetchRSS() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://baipin.pw/feed')}`);
                const data = await res.json();
                const container = document.getElementById('rss-feed-container');
                container.innerHTML = data.items.slice(0, 3).map(item => `
                    <a href="${item.link}" target="_blank" style="display:block; padding:12px; margin-bottom:8px; background:rgba(128,128,128,0.1); border-radius:10px; text-decoration:none; color:inherit;">
                        <div style="font-weight:bold">${item.title}</div>
                        <div style="font-size:0.8rem; opacity:0.6">${new Date(item.pubDate).toLocaleDateString()}</div>
                    </a>
                `).join('');
            } catch (e) {
                document.getElementById('rss-feed-container').innerHTML = '无法加载文章';
            }
        }
        fetchRSS();
    </script>
</body>
</html>
