<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百品 - 入口网站</title>
    
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    
    <style>
        :root { --nav-height: 64px; }

        /* 全局背景图层 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('/home.jpg') center/cover no-repeat;
            z-index: -1;
            transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 暗黑模式下的背景遮罩：覆盖手动设置 class 和 系统媒体查询 */
        .mdui-theme-dark body::before {
            filter: brightness(0.4) contrast(1.1);
        }
        @media (prefers-color-scheme: dark) {
            .mdui-theme-auto body::before {
                filter: brightness(0.4) contrast(1.1);
            }
        }

        /* 强制深色模式下的组件微调 */
        .mdui-theme-dark .custom-app-bar {
            background-color: rgba(28, 27, 31, 0.8) !important;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .mdui-theme-dark .main-card { background: #1c1b1f !important; color: #e6e1e5; }
        .mdui-theme-dark .sidebar-card { background: #2b2930 !important; }
        .mdui-theme-dark .rss-item { background: #2b2930; border-color: #49454f; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; overflow-x: hidden;
            background-color: #000; /* 兜底色 */
            font-family: "Product Sans", system-ui, -apple-system, sans-serif;
        }

        body { padding-top: var(--nav-height); background-color: transparent; }

        .custom-app-bar {
            height: var(--nav-height) !important;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding: 0 5%;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }

        .nav-logo { height: 28px; cursor: pointer; }

        .hero-section {
            width: 100%; height: 80vh;
            background: transparent;
            display: flex; align-items: flex-end; justify-content: center;
        }

        .photo-info-box {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 24px 32px;
            margin-bottom: 130px; 
            width: 90%; max-width: 1160px;
            display: flex; align-items: center; justify-content: space-between;
            color: white;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }

        .floating-container {
            max-width: 1200px;
            margin: -100px auto 60px;
            position: relative;
            z-index: 30;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 32px; padding: 0 20px;
        }

        .main-card { background: white; padding: 40px; border-radius: 24px; }
        .sidebar-card { background: #fafafa; padding: 40px 24px; border-radius: 24px; text-align: center; }

        footer { background: #121212; color: #777; padding: 60px 20px; text-align: center; }

        @media (max-width: 900px) {
            .nav-links-container { display: none; }
            .mobile-menu-btn { display: inline-flex !important; }
            .floating-container { grid-template-columns: 1fr; margin-top: -60px; }
            .sidebar-card { order: -1; }
            .photo-info-box { margin-bottom: 85px; padding: 16px 20px; }
            /* 修正：移动端不设置背景为 none，仅调整定位防止跳动 */
            body::before { background-attachment: scroll; } 
        }
    </style>
</head>
<body class="mdui-theme-auto">

    <mdui-navigation-drawer id="drawer" placement="right">
        <mdui-list>
            <mdui-list-item icon="home" href="#">首页</mdui-list-item>
            <mdui-list-item icon="auto_stories" href="https://baipin.pw">博客</mdui-list-item>
        </mdui-list>
    </mdui-navigation-drawer>

    <header class="custom-app-bar">
        <img src="/logo.png" alt="Logo" class="nav-logo" onclick="window.location.href='#'">
        <div class="nav-links-container" style="margin-left: 20px;">
            <mdui-button variant="text" href="#">首页</mdui-button>
            <mdui-button variant="text" href="https://baipin.pw">博客</mdui-button>
        </div>
        <div style="flex-grow: 1"></div>
        <mdui-button-icon id="theme-toggle" icon="light_mode"></mdui-button-icon>
        <mdui-button-icon icon="translate" id="lang-btn"></mdui-button-icon>
        <mdui-button-icon icon="menu" class="mobile-menu-btn" onclick="document.getElementById('drawer').open = true"></mdui-button-icon>
    </header>

    <section class="hero-section">
        <div class="photo-info-box">
            <div class="photo-text">
                <h4 data-i18n="photo_title">浙江丽水 · 云和梯田</h4>
                <p data-i18n="photo_desc">中国最美梯田，层叠的时光印记。</p>
            </div>
            <mdui-button variant="tonal" style="color: white; --mdui-color-secondary-container: rgba(255,255,255,0.15)">
                <mdui-icon slot="icon" name="arrow_forward"></mdui-icon>
            </mdui-button>
        </div>
    </section>

    <div class="floating-container">
        <main class="main-card">
            <h1 data-i18n="hero_title">我欲穿花寻路，直入白云深处。</h1>
            <p data-i18n="hero_desc">这里是 百品 (Baipin) 的入口。欢迎来到我的个人主页。</p>
            <div style="display: flex; gap: 12px;">
                <mdui-button variant="filled" href="https://baipin.pw">进入博客</mdui-button>
            </div>
            <mdui-divider style="margin: 40px 0;"></mdui-divider>
            <div id="rss-feed-container"></div>
        </main>
        <aside class="sidebar-card">
            <img src="https://github.com/baipin.png" style="width: 80px; border-radius: 50%;">
            <h2>Baipin</h2>
            <p data-i18n="bio">Student</p>
        </aside>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;

        // 核心：根据当前实际渲染的模式更新图标
        function updateIcon() {
            const isDark = html.classList.contains('mdui-theme-dark') || 
                          (html.classList.contains('mdui-theme-auto') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            themeToggle.icon = isDark ? 'dark_mode' : 'light_mode';
        }

        function applyTheme(theme) {
            html.classList.remove('mdui-theme-light', 'mdui-theme-dark', 'mdui-theme-auto');
            html.classList.add(`mdui-theme-${theme}`);
            updateIcon();
        }

        // 监听点击切换
        themeToggle.addEventListener('click', () => {
            const currentTheme = html.classList.contains('mdui-theme-dark') ? 'light' : 'dark';
            applyTheme(currentTheme);
            localStorage.setItem('theme', currentTheme);
        });

        // 监听系统媒体查询事件：当系统切换暗色/浅色时自动更新图标
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (html.classList.contains('mdui-theme-auto')) {
                updateIcon();
            }
        });

        // 初始化
        const savedTheme = localStorage.getItem('theme') || 'auto';
        applyTheme(savedTheme);

        // 模拟 RSS 数据
        async function fetchRSS() {
            const container = document.getElementById('rss-feed-container');
            container.innerHTML = '<p style="opacity:0.5">加载最新内容中...</p>';
            // ... 原有 fetch 代码
        }
        fetchRSS();
    </script>
</body>
</html>
